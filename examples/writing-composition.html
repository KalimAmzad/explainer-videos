<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {

  // ── Utilities ──

  // Setup stroke draw-on for any path/line/rect/circle
  function initStroke(id) {
    const el = document.getElementById(id);
    if (!el) return null;
    const len = el.getTotalLength ? el.getTotalLength() : 500;
    gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
    return { el, len };
  }

  // Animate a clip-rect to wipe-reveal text (left→right)
  function wipeReveal(clipRectId, targetWidth, duration, ease) {
    return gsap.to('#' + clipRectId, {
      attr: { width: targetWidth },
      duration: duration,
      ease: ease || 'power1.inOut'
    });
  }

  // Stroke draw-on tween
  function drawOn(id, duration, ease) {
    const info = initStroke(id);
    if (!info) return gsap.to({}, { duration: 0.01 });
    return gsap.to(info.el, {
      strokeDashoffset: 0,
      duration: duration,
      ease: ease || 'power1.inOut'
    });
  }

  // ── Build Master Timeline ──

  const tl = gsap.timeline({
    paused: true,
    onUpdate() {
      const t = tl.time();
      document.getElementById('timeDisp').textContent = t.toFixed(1) + ' / 15.0s';
      gsap.set('#progBar', { attr: { width: (t / 15) * 1280 }});
    }
  });


  // ════════════════════════════════════════════
  //  SCENE 1: TITLE  (0.0 → 2.3s)
  // ════════════════════════════════════════════

  // 0.0 — Bullet dot scales in
  tl.to('#p_dot', { opacity: 1, duration: 0.2, ease: 'power2.out' }, 0.0);

  // 0.15 — Title text wipes in L→R
  tl.add(wipeReveal('cr_title', 920, 1.4, 'power1.inOut'), 0.15);

  // 1.6 — Underline 1 draws
  tl.add(drawOn('p_ul1', 0.35), 1.6);

  // 1.95 — Underline 2 draws
  tl.add(drawOn('p_ul2', 0.3), 1.95);


  // ════════════════════════════════════════════
  //  SCENE 2: SUBTITLE  (2.3 → 3.6s)
  // ════════════════════════════════════════════

  tl.add(wipeReveal('cr_sub', 720, 1.2, 'power1.inOut'), 2.3);


  // ════════════════════════════════════════════
  //  SCENE 3: LEFT — Paper  (3.6 → 7.0s)
  // ════════════════════════════════════════════

  // 3.6 — Back paper outline draws
  tl.add(drawOn('p_backpaper', 0.6), 3.6);
  // Back paper fill
  tl.set('#p_backpaper', { fill: '#f5f5ec' }, 4.0);
  // Back paper lines appear
  tl.to('#p_backlines', { opacity: 0.5, duration: 0.2 }, 4.1);

  // 4.2 — Front paper outline draws
  tl.add(drawOn('p_frontpaper', 0.55), 4.2);
  // Front paper fill
  tl.to('#p_frontfill', { opacity: 1, duration: 0.15 }, 4.6);
  // Corner fold
  tl.add(drawOn('p_fold', 0.15), 4.65);
  // Red margin line draws
  tl.add(drawOn('p_margin', 0.25), 4.7);
  // Front paper ruled lines appear
  tl.to('#p_frontlines', { opacity: 1, duration: 0.2 }, 4.85);

  // 5.1 — "hello" handwriting wipes in
  tl.add(wipeReveal('cr_hello', 120, 0.45, 'none'), 5.1);

  // 5.6 — "class 3" handwriting wipes in
  tl.add(wipeReveal('cr_class3', 145, 0.45, 'none'), 5.6);

  // 6.1 — Pencil appears (draws in)
  tl.to('#g_pencil', { opacity: 1, duration: 0.4, ease: 'power2.out' }, 6.1);
  // Hand appears
  tl.to('#g_hand', { opacity: 1, duration: 0.35, ease: 'power2.out' }, 6.2);

  // 6.6 — Label wipes in
  tl.add(wipeReveal('cr_lblhw', 250, 0.5, 'power1.inOut'), 6.6);


  // ════════════════════════════════════════════
  //  SCENE 4: MIDDLE — Blocks  (7.1 → 10.2s)
  // ════════════════════════════════════════════

  // --- Introduction ---
  // 7.1 — Block outline draws
  tl.add(drawOn('p_introRect', 0.45), 7.1);
  // Fill appears
  tl.to('#p_introFill', { opacity: 1, duration: 0.15 }, 7.45);
  // 3D edges
  tl.to('#p_intro3d', { opacity: 0.7, duration: 0.1 }, 7.5);
  // "Introduction" text wipes
  tl.add(wipeReveal('cr_intro', 260, 0.4, 'none'), 7.6);

  // --- Body Paragraph ---
  tl.add(drawOn('p_bodyRect', 0.45), 8.1);
  tl.to('#p_bodyFill', { opacity: 1, duration: 0.15 }, 8.45);
  tl.to('#p_body3d', { opacity: 0.7, duration: 0.1 }, 8.5);
  tl.add(wipeReveal('cr_body', 260, 0.45, 'none'), 8.6);

  // --- Conclusion ---
  tl.add(drawOn('p_concRect', 0.45), 9.1);
  tl.to('#p_concFill', { opacity: 1, duration: 0.15 }, 9.45);
  tl.to('#p_conc3d', { opacity: 0.7, duration: 0.1 }, 9.5);
  tl.add(wipeReveal('cr_conc', 260, 0.35, 'none'), 9.6);

  // --- Label ---
  tl.add(wipeReveal('cr_lblst', 330, 0.5, 'power1.inOut'), 9.95);


  // ════════════════════════════════════════════
  //  SCENE 5: RIGHT — Punctuation  (10.5 → 13.8s)
  // ════════════════════════════════════════════

  // 10.5 — Question mark outer curve draws
  tl.add(drawOn('p_qcurve', 0.9, 'power1.inOut'), 10.5);
  // Inner highlight
  tl.add(drawOn('p_qinner', 0.7), 10.7);
  // Hatching fades in
  tl.to('#g_qhatch', { opacity: 0.45, duration: 0.3 }, 11.2);
  // Q dot
  tl.add(drawOn('p_qdot', 0.2), 11.4);

  // 11.6 — Exclamation bar draws
  tl.add(drawOn('p_ebar', 0.4), 11.6);
  // E hatching
  tl.to('#g_ehatch', { opacity: 0.45, duration: 0.2 }, 11.9);
  // E dot
  tl.add(drawOn('p_edot', 0.15), 12.05);

  // 12.2 — Speech bubble draws
  tl.add(drawOn('p_bubble', 0.4), 12.2);

  // 12.6 — Comma draws
  tl.add(drawOn('p_comma', 0.25), 12.6);

  // 12.9 — Grammar & Punctuation label wipes
  tl.add(wipeReveal('cr_lblgr', 280, 0.5, 'power1.inOut'), 12.9);


  // ════════════════════════════════════════════
  //  SCENE 6: MARKER TRAY  (13.8 → 14.6s)
  // ════════════════════════════════════════════

  tl.to('#g_tray', { opacity: 1, duration: 0.6, ease: 'power2.out' }, 13.8);

  // Hold final frame
  tl.to({}, { duration: 0.4 }, 14.6);


  // ── Controls ──

  document.getElementById('btnPlay').addEventListener('click', () => {
    if (tl.isActive()) {
      tl.pause();
      document.getElementById('btnPlay').textContent = '▶ Play';
    } else {
      tl.play();
      document.getElementById('btnPlay').textContent = '⏸ Pause';
    }
  });

  document.getElementById('btnReplay').addEventListener('click', () => {
    // Reset all clip rects
    document.querySelectorAll('[id^="cr_"]').forEach(r => r.setAttribute('width', '0'));
    // Reset all stroke elements
    ['p_ul1','p_ul2','p_backpaper','p_frontpaper','p_fold','p_margin',
     'p_introRect','p_bodyRect','p_concRect',
     'p_qcurve','p_qinner','p_qdot','p_ebar','p_edot','p_bubble','p_comma'
    ].forEach(id => {
      const el = document.getElementById(id);
      if (el && el.getTotalLength) {
        const len = el.getTotalLength();
        gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
      }
    });
    // Reset opacity elements
    gsap.set('#p_dot', { opacity: 0 });
    gsap.set('#p_backlines', { opacity: 0 });
    gsap.set('#p_frontfill', { opacity: 0 });
    gsap.set('#p_frontlines', { opacity: 0 });
    gsap.set('#g_pencil, #g_hand', { opacity: 0 });
    gsap.set('#p_introFill, #p_bodyFill, #p_concFill', { opacity: 0 });
    gsap.set('#p_intro3d, #p_body3d, #p_conc3d', { opacity: 0 });
    gsap.set('#g_qhatch, #g_ehatch', { opacity: 0 });
    gsap.set('#g_tray', { opacity: 0 });
    gsap.set('#p_backpaper', { fill: 'none' });
    gsap.set('#progBar', { attr: { width: 0 }});

    tl.restart();
    document.getElementById('btnPlay').textContent = '⏸ Pause';
  });

  // Auto-play after brief delay
  setTimeout(() => {
    tl.play();
    document.getElementById('btnPlay').textContent = '⏸ Pause';
  }, 600);

});
</script>
</body>
</html>
