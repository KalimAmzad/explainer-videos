<!DOCTYPE html>

<style>

#timeDisp{color:#777;font:12px monospace;min-width:100px}
#seekBar{width:300px;cursor:pointer;accent-color:#2b7ec2}
</style>
</head>

<!-- ═══════════════════════════════════════════════ -->
<!-- SCENE 3: Cell = Tiny City (13-24s)             -->
<!-- ═══════════════════════════════════════════════ -->
<g id="scene3" class="scene">
  <!-- Large cell diagram (left side) -->
  <g id="s3_cell" opacity="0">
    <!-- Cell outer membrane -->
    <ellipse cx="250" cy="370" rx="220" ry="240" fill="none" stroke="#333" stroke-width="3"/>
    <!-- Inner structures - nucleus -->
    <circle cx="220" cy="320" r="65" fill="none" stroke="#333" stroke-width="2.5"/>
    <circle cx="210" cy="310" r="18" fill="#333" opacity=".7"/>
    <!-- Mitochondria -->
    <ellipse cx="370" cy="240" rx="40" ry="20" fill="none" stroke="#333" stroke-width="2" transform="rotate(-20,370,240)"/>
    <path d="M340,235 C350,228 360,245 370,235 C380,228 390,245 395,238" fill="none" stroke="#333" stroke-width="1.5" transform="rotate(-20,370,240)"/>

    <circle cx="200" cy="480" r="3" fill="#333"/><circle cx="280" cy="500" r="3" fill="#333"/>

    <ellipse cx="350" cy="420" rx="20" ry="12" fill="none" stroke="#333" stroke-width="1.5"/>

    <rect x="280" y="120" width="25" height="35" fill="none" stroke="#333" stroke-width="1.2"/>

<!-- ═══════════════════════════════════════════════════ -->

    <circle cx="420" cy="350" r="5" fill="none" stroke="#333" stroke-width="1.5"/>

    <path d="M280,300 L300,330 M300,300 L280,330" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>

<!-- ═══════════════════════════════════════════════════════ -->
<g id="scene10" class="scene">
  <!-- Clipboard icon -->
  <g id="s10_clip" opacity="0" transform="translate(220,15)">
    <rect x="0" y="15" width="70" height="85" rx="5" fill="none" stroke="#333" stroke-width="2.5"/>
    <rect x="15" y="5" width="40" height="18" rx="8" fill="none" stroke="#333" stroke-width="2"/>
    <circle cx="35" cy="10" r="4" fill="none" stroke="#333" stroke-width="1.5"/>
    <!-- Checklist lines -->
    <path d="M12,42 L18,50 L28,35" fill="none" stroke="#333" stroke-width="2"/><line x1="35" y1="42" x2="58" y2="42" stroke="#333" stroke-width="1.5"/>
    <rect x="12" y="55" width="12" height="10" fill="none" stroke="#333" stroke-width="1.2"/><line x1="35" y1="62" x2="58" y2="62" stroke="#333" stroke-width="1.5"/>
    <rect x="12" y="75" width="12" height="10" fill="none" stroke="#333" stroke-width="1.2"/><line x1="35" y1="82" x2="58" y2="82" stroke="#333" stroke-width="1.5"/>
    <!-- Pencil -->
    <line x1="55" y1="20" x2="75" y2="0" stroke="#cc3333" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <!-- Title -->
  <g><clipPath id="c10t"><rect id="r10t" x="290" y="20" width="0" height="80"/></clipPath>
  <text clip-path="url(#c10t)" x="310" y="82" font-family="'Cabin Sketch',cursive" font-size="60" font-weight="700" fill="#222">Cell City Checklist</text></g>

  <!-- Checklist items -->
  <!-- 1. Membrane = Gate -->
  <g id="s10_item1" opacity="0">
    <rect x="50" y="128" width="420" height="52" rx="5" fill="none" stroke="#333" stroke-width="2"/>
    <path d="M68,148 L78,162 L98,138" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <text x="115" y="163" font-family="'Cabin Sketch',cursive" font-size="32" font-weight="700" fill="#222">Membrane = <tspan fill="#cc3333">Gate</tspan></text>
  </g>

  <!-- 2. Nucleus = Control Center -->
  <g id="s10_item2" opacity="0">
    <path d="M68,222 L78,236 L98,212" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <text x="115" y="237" font-family="'Cabin Sketch',cursive" font-size="30" font-weight="700" fill="#222">Nucleus = <tspan fill="#cc3333">Control Center</tspan></text>
  </g>

  <!-- 3. Mitochondria = Energy -->
  <g id="s10_item3" opacity="0">
    <path d="M68,296 L78,310 L98,286" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <text x="115" y="311" font-family="'Cabin Sketch',cursive" font-size="30" font-weight="700" fill="#222">Mitochondria = <tspan fill="#cc3333">Energy</tspan></text>
  </g>

  <!-- 4. Ribosomes = Proteins -->
  <g id="s10_item4" opacity="0">
    <path d="M68,370 L78,384 L98,360" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <text x="115" y="385" font-family="'Cabin Sketch',cursive" font-size="30" font-weight="700" fill="#222">Ribosomes = <tspan fill="#cc3333">Proteins</tspan></text>
  </g>

  <!-- 5. Chloroplasts = Food -->
  <g id="s10_item5" opacity="0">
    <path d="M68,444 L78,458 L98,434" fill="none" stroke="#333" stroke-width="4" stroke-linecap="round"/>
    <text x="115" y="459" font-family="'Cabin Sketch',cursive" font-size="28" font-weight="700" fill="#222">Chloroplasts = <tspan fill="#cc3333">Food (Plants Only)</tspan></text>
  </g>

  <!-- Right side: city analogy mini illustrations -->
  <g id="s10_cityIcons" opacity="0" transform="translate(580, 120)">
    <!-- Gate/wall icon -->
    <g>
      <path d="M60,0 L60,60 L40,60 L40,30 L20,30 L20,0 Z M110,0 L110,60 L130,60 L130,30 L150,30 L150,0 Z M60,30 L110,30 M60,60 L110,60"
            fill="none" stroke="#333" stroke-width="2"/>
      <text x="55" y="80" font-family="'Cabin Sketch',cursive" font-size="12" fill="#222">GATE</text>
    </g>
    
    <!-- Command hub icon -->
    <g transform="translate(250, -10)">
      <circle cx="80" cy="40" r="45" fill="none" stroke="#333" stroke-width="2"/>
      <text x="38" y="30" font-family="'Cabin Sketch',cursive" font-size="10" fill="#222">CITY HALL</text>
      <circle cx="80" cy="55" r="8" fill="#555" opacity=".3"/>
      <text x="40" y="100" font-family="'Cabin Sketch',cursive" font-size="11" fill="#222">COMMAND HUB</text>
    </g>
    
    <!-- Power station icon -->
    <g transform="translate(100, 150)">
      <path d="M20,40 L20,80 L120,80 L120,40 Z M40,10 L40,40 L60,40 L60,10 Z M80,20 L80,40 L100,40 L100,20Z"
            fill="none" stroke="#333" stroke-width="1.8"/>
      <text x="25" y="98" font-family="'Cabin Sketch',cursive" font-size="11" fill="#cc3333">POWERHOUSE</text>
      <!-- Lightning -->
      <path d="M130,25 L125,45 L135,40 L128,60" fill="none" stroke="#cc3333" stroke-width="2.5"/>
    </g>
    
    <!-- Factory icon -->
    <g transform="translate(30, 280)">
      <path d="M20,30 L20,70 L140,70 L140,30 Z M30,0 L30,30 L50,30 L50,0Z" fill="none" stroke="#333" stroke-width="1.8"/>
      <text x="30" y="60" font-family="'Cabin Sketch',cursive" font-size="11" fill="#222">FACTORY</text>
      <text x="20" y="90" font-family="'Cabin Sketch',cursive" font-size="11" fill="#222">MANUFACTURING</text>
    </g>

    <!-- Solar/Food icon -->
    <g transform="translate(200, 310)">
      <circle cx="40" cy="20" r="20" fill="none" stroke="#cc3333" stroke-width="2"/>
      <path d="M40,0 L40,-8 M60,10 L68,5 M55,35 L62,42 M25,35 L18,42 M20,10 L12,5" fill="none" stroke="#cc3333" stroke-width="1.5"/>
      <text x="0" y="60" font-family="'Cabin Sketch',cursive" font-size="11" fill="#222">PHOTOSYNTHESIS</text>
    </g>
  </g>
</g>

<!-- Progress bar -->
<rect x="0" y="710" width="1280" height="4" fill="#d5d0c8"/>
<rect id="progBar" x="0" y="710" width="0" height="4" fill="#2b7ec2"/>
</svg>
</div>

<div id="controls">
  <button id="btnPlay">▶ Play</button>
  <button id="btnReplay">↻ Replay</button>
  <input type="range" id="seekBar" min="0" max="860" value="0" step="1"/>
  <span id="timeDisp">0.0 / 86.0s</span>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', () => {
  const TOTAL = 86;
  const seekBar = document.getElementById('seekBar');
  let isSeeking = false;

  // ── Utilities ──
  function initStroke(id) {
    const el = document.getElementById(id);
    if (!el || !el.getTotalLength) return;
    const len = el.getTotalLength();
    gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
  }
  function drawOn(id, dur) {
    const el = document.getElementById(id);
    if (!el || !el.getTotalLength) return gsap.to({}, {duration:.01});
    const len = el.getTotalLength();
    gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
    return gsap.to(el, { strokeDashoffset: 0, duration: dur, ease: 'power1.inOut' });
  }
  function wipe(clipId, w, dur) {
    return gsap.to('#' + clipId, { attr: { width: w }, duration: dur, ease: 'power1.inOut' });
  }
  function fadeIn(sel, dur, d) {
    return gsap.to(sel, { opacity: 1, duration: dur || 0.5 });
  }
  function showScene(id) { gsap.set(id, { opacity: 1 }); }
  function hideScene(id) { gsap.set(id, { opacity: 0 }); }

  // ── Master Timeline ──
  const tl = gsap.timeline({
    paused: true,
    onUpdate() {
      const t = tl.time();
      if (!isSeeking) seekBar.value = Math.round(t * 10);
      document.getElementById('timeDisp').textContent = t.toFixed(1) + ' / ' + TOTAL + 's';
      gsap.set('#progBar', { attr: { width: (t / TOTAL) * 1280 }});
    }
  });

  // ════════════════════════════════════════
  //  SCENE 1: Body = Trillions of Cells (0-7s)
  // ════════════════════════════════════════
  tl.call(() => showScene('#scene1'), null, 0);
  tl.add(wipe('r1a', 250, 1.5), 0.2);
  tl.add(wipe('r1b', 220, 1.2), 1.5);
  tl.add(drawOn('s1_ul', 0.4), 2.5);
  tl.add(wipe('r1c', 200, 1.0), 3.0);
  tl.add(fadeIn('#s1_body', 1.5), 4.0);

  // ════════════════════════════════════════
  //  SCENE 2: Body→Organ→Tissue (7-13s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene1'); showScene('#scene2'); }, null, 7.0);
  tl.add(wipe('r2a', 250, 1.0), 7.2);
  tl.add(fadeIn('#s2_body', 1.2), 7.5);
  tl.add(fadeIn('#s2_mag', 0.5), 8.5);
  tl.add(wipe('r2b', 200, 0.8), 9.0);
  tl.add(fadeIn('#s2_arm', 1.0), 9.2);
  tl.to('#s2_arrow1', { opacity: 1, duration: 0.4 }, 10.5);
  tl.add(wipe('r2c', 150, 0.7), 10.8);
  tl.add(fadeIn('#s2_tissue', 1.2), 11.0);

  // ════════════════════════════════════════
  //  SCENE 3: Cell = Tiny City (13-24s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene2'); showScene('#scene3'); }, null, 13.0);
  tl.add(fadeIn('#s3_cell', 2.0), 13.2);
  tl.add(fadeIn('#s3_labels', 1.5), 14.5);
  tl.add(wipe('r3a', 420, 1.5), 16.5);
  tl.add(fadeIn('#s3_city', 2.5), 18.0);
  tl.add(wipe('r3b', 300, 0.8), 21.0);
  tl.add(wipe('r3c', 350, 0.8), 22.5);

  // ════════════════════════════════════════
  //  SCENE 4: Cell Membrane (24-28s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene3'); showScene('#scene4'); }, null, 24.0);
  tl.add(fadeIn('#s4_cell', 1.5), 24.2);
  tl.add(fadeIn('#s4_label', 0.6), 25.5);
  tl.add(fadeIn('#s4_checks', 0.5), 26.0);
  tl.add(wipe('r4a', 550, 2.0), 26.0);

  // ════════════════════════════════════════
  //  SCENE 5: Nucleus (28-37s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene4'); showScene('#scene5'); }, null, 28.0);
  tl.add(wipe('r5t', 900, 1.5), 28.2);
  tl.add(fadeIn('#s5_nlabel', 0.5), 29.5);
  tl.add(fadeIn('#s5_nucleus', 2.0), 30.0);
  tl.add(wipe('r5c', 250, 0.8), 31.5);
  tl.add(fadeIn('#s5_eq', 0.3), 33.0);
  tl.add(fadeIn('#s5_cityhall', 2.0), 33.5);
  tl.add(fadeIn('#s5_scroll', 1.0), 35.5);

  // ════════════════════════════════════════
  //  SCENE 6: Mitochondria (37-45s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene5'); showScene('#scene6'); }, null, 37.0);
  tl.add(wipe('r6t', 750, 1.2), 37.2);
  tl.add(fadeIn('#s6_thought', 0.8), 38.5);
  tl.add(fadeIn('#s6_mito', 2.5), 39.0);
  tl.add(fadeIn('#s6_partlabels', 1.0), 41.0);
  tl.add(fadeIn('#s6_plant', 2.0), 42.0);

  // ════════════════════════════════════════
  //  SCENE 7: Ribosomes (45-53s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene6'); showScene('#scene7'); }, null, 45.0);
  tl.add(wipe('r7t', 750, 1.2), 45.2);
  tl.add(wipe('r7a', 200, 0.8), 46.5);
  tl.add(fadeIn('#s7_cell', 2.0), 47.0);
  tl.add(fadeIn('#s7_factory', 2.0), 49.0);
  tl.add(fadeIn('#s7_blocks', 1.5), 51.0);

  // ════════════════════════════════════════
  //  SCENE 8: Plant Cells Only (53-63s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene7'); showScene('#scene8'); }, null, 53.0);
  tl.add(wipe('r8t', 550, 1.5), 53.2);
  tl.add(drawOn('s8_ul', 0.5), 54.5);
  tl.add(fadeIn('#s8_sun', 1.2), 55.5);
  tl.add(fadeIn('#s8_panel', 2.0), 57.0);
  tl.add(wipe('r8a', 600, 3.0), 59.0);

  // ════════════════════════════════════════
  //  SCENE 9: Animal vs Plant (63-73s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene8'); showScene('#scene9'); }, null, 63.0);
  tl.to('#s9_bg', { opacity: 1, duration: 0.5 }, 63.0);
  tl.add(wipe('r9t', 900, 2.0), 63.5);
  tl.add(fadeIn('#s9_banner', 0.8), 65.5);
  tl.add(fadeIn('#s9_shared', 2.5), 66.5);
  tl.add(fadeIn('#s9_plants', 2.0), 70.0);

  // ════════════════════════════════════════
  //  SCENE 10: Cell City Checklist (73-86s)
  // ════════════════════════════════════════
  tl.call(() => { hideScene('#scene9'); showScene('#scene10'); gsap.set('#bgRect', { fill: 'url(#bg)' }); }, null, 73.0);
  tl.add(fadeIn('#s10_clip', 0.6), 73.2);
  tl.add(wipe('r10t', 700, 1.5), 73.5);
  tl.add(fadeIn('#s10_item1', 0.8), 75.5);
  tl.add(fadeIn('#s10_item2', 0.8), 77.5);
  tl.add(fadeIn('#s10_item3', 0.8), 79.5);
  tl.add(fadeIn('#s10_item4', 0.8), 81.0);
  tl.add(fadeIn('#s10_item5', 0.8), 82.5);
  tl.add(fadeIn('#s10_cityIcons', 2.0), 76.0);
  // Hold
  tl.to({}, { duration: 1 }, 85);

  // ── Controls ──
  document.getElementById('btnPlay').onclick = () => {
    if (tl.isActive()) { tl.pause(); document.getElementById('btnPlay').textContent = '▶ Play'; }
    else { tl.play(); document.getElementById('btnPlay').textContent = '⏸ Pause'; }
  };
  document.getElementById('btnReplay').onclick = () => {
    tl.seek(0).pause();
    // Reset all
    document.querySelectorAll('.scene').forEach(s => gsap.set(s, { opacity: 0 }));
    document.querySelectorAll('[id^="r"]').forEach(r => { if (r.tagName === 'rect' && r.id.match(/^r\d/)) r.setAttribute('width', '0'); });
    gsap.set('#bgRect', { fill: 'url(#bg)' });
    gsap.set('#s9_bg', { opacity: 0 });
    tl.restart();
    document.getElementById('btnPlay').textContent = '⏸ Pause';
  };

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    tl.seek(seekBar.value / 10).pause();
    document.getElementById('btnPlay').textContent = '▶ Play';
    setTimeout(() => { isSeeking = false; }, 100);
  });

  // Auto-play
  setTimeout(() => { tl.play(); document.getElementById('btnPlay').textContent = '⏸ Pause'; }, 800);
});
</script>
</body>
</html>
