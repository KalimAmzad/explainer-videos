    <polygon points="125.5 82.2 129.8 93.6 142.3 94.3 132.5 102.6 135.7 114.5 125.1 108.1 114.3 114.5 117.5 102.4 107.8 94.3 120.2 93.4" fill="none" stroke="#2b7ec2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Title -->
  <g clip-path="url(#cp_s1_title)">
    <text x="640" y="55" text-anchor="middle" font-family="'Cabin Sketch',cursive" font-size="48" font-weight="700" fill="#2b7ec2">Names That Heal</text>
  </g>

  <!-- Wavy underline beneath title -->
  <path id="s1_underline" d="M 432 68 Q 490 78 548 68 Q 606 58 664 68 Q 722 78 780 68 Q 820 62 848 68" fill="none" stroke="#2b7ec2" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Body line 1: Allah has 99 Beautiful Names -->
  <g clip-path="url(#cp_s1_body1)">
    <text x="640" y="185" text-anchor="middle" font-family="'Caveat',cursive" font-size="34" fill="#333">Allah has <tspan font-family="'Permanent Marker',cursive" fill="#2b7ec2">99 Beautiful Names</tspan></text>
  </g>

  <!-- Body line 2: Each name is a door to knowing Him -->
  <g clip-path="url(#cp_s1_body2)">
    <text x="640" y="233" text-anchor="middle" font-family="'Caveat',cursive" font-size="34" fill="#333">Each name is a door to <tspan font-family="'Permanent Marker',cursive" fill="#cc7722">knowing Him</tspan></text>
  </g>

