<g id="scene3" class="scene">

  <!-- Title -->
  <g clip-path="url(#cp_s3_title)">
    <text x="640" y="55" text-anchor="middle" font-family="'Cabin Sketch',cursive" font-size="48" font-weight="700" fill="#8844aa">At-Tawab: Ever-Returning</text>
  </g>

  <!-- Wavy underline beneath title -->
  <path id="s3_underline" d="M313 70 Q370 78 430 68 Q490 58 550 70 Q610 80 670 68 Q730 58 790 70 Q840 78 967 70" fill="none" stroke="#8844aa" stroke-width="3" stroke-linecap="round" stroke-dasharray="1000" stroke-dashoffset="1000"/>

  <!-- ===== LEFT HALF: Loop Diagram (centered around x=310, y=390) ===== -->

  <!-- Stick figure (Servant) at bottom of loop, scaled 2.5x, translated to left zone -->
  <g id="s3_illust_diagram" opacity="0" transform="translate(175, 195) scale(2.5)">
    <!-- Head -->
    <circle cx="100.5" cy="160.5" r="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Body -->
    <line x1="100.5" y1="172.5" x2="100.5" y2="185.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arms raised in dua -->
    <line x1="97.5" y1="175.5" x2="88.5" y2="168.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="103.5" y1="175.5" x2="112.5" y2="168.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Legs -->
    <line x1="98.5" y1="185.5" x2="90.5" y2="197.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="102.5" y1="185.5" x2="110.5" y2="197.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Mercy circle (top) -->
    <circle cx="100.5" cy="40.5" r="20" fill="none" stroke="#8844aa" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Radiating lines -->
    <line x1="100.5" y1="20.5" x2="100.5" y2="15.5" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="110.5" y1="23.2" x2="113.0" y2="18.9" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="120.5" y1="40.5" x2="125.5" y2="40.5" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="110.5" y1="57.8" x2="113.0" y2="62.1" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="90.5" y1="57.8" x2="88.0" y2="62.1" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="80.5" y1="40.5" x2="75.5" y2="40.5" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="90.5" y1="23.2" x2="88.0" y2="18.9" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Left curved arrow (Tawbah: upward from servant to mercy) -->
    <path d="M 80.5 160.5 Q 50.5 100.5 80.5 40.5 L 81 40.5 Q 51 100.5 81 160.5 Z" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="80.5,40.5 77.5,47.5 83.5,47.5" fill="#8844aa" stroke="none"/>
    <!-- Tick marks on left arrow -->
    <line x1="73.5" y1="145.5" x2="77.5" y2="145.5" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="65.5" y1="128.5" x2="69.5" y2="128.5" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="58.5" y1="98.5" x2="58.5" y2="102.5" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="65.5" y1="72.5" x2="69.5" y2="72.5" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="73.5" y1="55.5" x2="77.5" y2="55.5" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Right curved arrow (Acceptance: downward from mercy to servant) -->
    <path d="M 120.5 40.5 Q 150.5 100.5 120.5 160.5 L 120 160.5 Q 149.5 100.5 120 40.5 Z" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <polygon points="120.5,160.5 117.5,153.5 123.5,153.5" fill="#333" stroke="none"/>
    <!-- Tick marks on right arrow -->
    <line x1="123.5" y1="55.5" x2="127.5" y2="55.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="131.5" y1="72.5" x2="135.5" y2="72.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="142.5" y1="98.5" x2="142.5" y2="102.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="131.5" y1="128.5" x2="135.5" y2="128.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="123.5" y1="145.5" x2="127.5" y2="145.5" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Label: Servant -->
  <g clip-path="url(#cp_s3_lbl_servant)">
    <text id="s3_lbl_servant" x="148" y="578" font-family="'Patrick Hand',cursive" font-size="26" fill="#333">Servant</text>
  </g>

  <!-- Label: Allah's Mercy -->
  <g clip-path="url(#cp_s3_lbl_mercy)">
    <text id="s3_lbl_mercy" x="148" y="196" font-family="'Patrick Hand',cursive" font-size="26" fill="#8844aa">Allah's Mercy</text>
  </g>

  <!-- Label: Tawbah (left side of loop) -->
  <g clip-path="url(#cp_s3_lbl_tawbah)">
    <text id="s3_lbl_tawbah" x="90" y="408" font-family="'Permanent Marker',cursive" font-size="26" fill="#8844aa">Tawbah</text>
  </g>

  <!-- Label: Acceptance (right side of loop) -->
  <g clip-path="url(#cp_s3_lbl_accept)">
    <text id="s3_lbl_accept" x="370" y="408" font-family="'Permanent Marker',cursive" font-size="26" fill="#333">Acceptance</text>
  </g>

  <!-- Infinite loop indicator text -->
  <g clip-path="url(#cp_s3_infinite)">
    <text id="s3_lbl_infinite" x="200" y="645" font-family="'Caveat',cursive" font-size="28" fill="#8844aa">∞ repeating loop</text>
  </g>

  <!-- ===== RIGHT HALF: Body Text Teaching Notes ===== -->

  <!-- Body line 1: Root: Tawb = to return, turn back -->
  <g clip-path="url(#cp_s3_body1)">
    <text x="660" y="240" font-family="'Caveat',cursive" font-size="34" fill="#333">Root: Tawb = to return, turn back</text>
  </g>

  <!-- Body line 2: Allah turns toward the one who repents -->
  <g clip-path="url(#cp_s3_body2)">
    <text x="660" y="290" font-family="'Caveat',cursive" font-size="34" fill="#333">Allah turns toward the one who repents</text>
  </g>

  <!-- Body line 3: Not once — again and again and again -->
  <g clip-path="url(#cp_s3_body3)">
    <text x="660" y="340" font-family="'Caveat',cursive" font-size="34" fill="#333">Not once — again and again and again</text>
  </g>

  <!-- Body line 4: Mentioned 11 times in the Quran -->
  <g clip-path="url(#cp_s3_body4)">
    <text x="660" y="390" font-family="'Caveat',cursive" font-size="34" fill="#333">Mentioned 11 times in the Quran</text>
  </g>

  <!-- Decorative emphasis box around body3 (drawn via rough.js in JS) -->

  <!-- Vertical divider line between left and right zones -->
  <line id="s3_divider" x1="590" y1="100" x2="590" y2="660" stroke="#ccbbdd" stroke-width="1.5" stroke-dasharray="8,6" stroke-linecap="round" opacity="0.5"/>

  <!-- Key term highlight arrow pointing to loop -->
  <path id="s3_arrow_loop" d="M 620 410 Q 580 430 545 420" fill="none" stroke="#8844aa" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow_8844aa)" stroke-dasharray="200" stroke-dashoffset="200"/>

</g>