    <path d="M 20 130 Q 50 136 80 129 Q 110 121 140 133 Q 170 139 180 131 Z" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 25 150 Q 55 156 85 149 Q 115 141 145 153 Q 175 159 180 151 Z" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 21 170 Q 51 176 81 169 Q 111 161 141 173 Q 171 179 181 171 Z" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Wind swoosh lines -->
    <path d="M 160 140 Q 170 135 175 145 Q 170 150 160 140 Z" fill="none" stroke="#1e8c5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 155 155 Q 165 150 170 160 Q 165 165 155 155 Z" fill="none" stroke="#1e8c5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M 150 170 Q 160 165 165 175 Q 160 180 150 170 Z" fill="none" stroke="#1e8c5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Rough.js frame placeholder for right panel zone -->
  <g id="rough_s2_panel_frame" opacity="0"></g>

</g>