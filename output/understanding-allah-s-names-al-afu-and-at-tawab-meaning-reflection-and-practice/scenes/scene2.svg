    <!-- Footprints -->
    <ellipse cx="61" cy="31" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="71" cy="36" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="101" cy="26" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="111" cy="31" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="76" cy="51" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="86" cy="56" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="131" cy="46" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <ellipse cx="141" cy="51" rx="8" ry="12" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Downward arrow between panels -->
  <path id="s2_panel_arrow" d="M 970 325 L 970 415" fill="none" stroke="#1e8c5a" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow_1e8c5a)"/>

  <!-- Arrow label: Al-Afu -->
  <g clip-path="url(#cp_s2_arrow_label)">
    <text x="790" y="422" font-family="'Permanent Marker',cursive" font-size="30" fill="#1e8c5a">Al-Afu</text>
  </g>

  <!-- BOTTOM PANEL: Smooth sand with wind -->
  <text id="s2_panel_bot_label" x="970" y="450" font-family="'Patrick Hand',cursive" font-size="22" fill="#888" text-anchor="middle" opacity="0">After</text>

  <g id="s2_illust_bottom" opacity="0" transform="translate(730, 455) scale(2.4)">
