<g id="scene2" class="scene">
  <!-- Title -->
  <g clip-path="url(#cp_s2_title)">
    <text x="60" y="62" font-family="'Cabin Sketch',cursive" font-size="48" font-weight="700" fill="#1e8c5a">Al-Afu: The Pardoner</text>
  </g>
  <!-- Underline -->
  <path id="s2_underline" d="M 60 74 Q 150 80 260 73 Q 370 66 480 74 Q 530 78 560 73" fill="none" stroke="#1e8c5a" stroke-width="3" stroke-linecap="round"/>

  <!-- Body Line 1: Root -->
  <g clip-path="url(#cp_s2_body1)">
    <text x="60" y="210" font-family="'Caveat',cursive" font-size="34" fill="#333">Root: <tspan font-family="'Permanent Marker',cursive" font-size="30" fill="#1e8c5a">'Afw</tspan> = to wipe away entirely</text>
  </g>

  <!-- Body Line 2: Not just forgiveness -->
  <g clip-path="url(#cp_s2_body2)">
    <text x="60" y="258" font-family="'Caveat',cursive" font-size="34" fill="#333">Not just forgiveness — <tspan font-family="'Permanent Marker',cursive" font-size="30" fill="#cc7722">complete erasure</tspan></text>
  </g>

  <!-- Body Line 3: Wind analogy -->
  <g clip-path="url(#cp_s2_body3)">
    <text x="60" y="410" font-family="'Caveat',cursive" font-size="34" fill="#333">Like wind erasing footprints in sand</text>
  </g>

  <!-- Body Line 4: Hadith reference -->
  <g clip-path="url(#cp_s2_body4)">
    <text x="92" y="578" font-family="'Caveat',cursive" font-size="32" fill="#333">Aisha (RA) was taught: <tspan font-family="'Permanent Marker',cursive" font-size="28" fill="#1e8c5a">Allahumma innaka 'Afuww</tspan></text>
  </g>

  <!-- Scroll icon (supporting) -->
  <g id="s2_illust_supporting" opacity="0" transform="translate(40, 530) scale(0.55)">
    <rect x="84" y="91" width="31" height="19" fill="none" stroke="#1e8c5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="73" cy="101" r="10" fill="none" stroke="#1e8c5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="126" cy="99" r="10" fill="none" stroke="#1e8c5a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== RIGHT HALF ILLUSTRATION ===== -->

  <!-- TOP PANEL: Footprints in sand -->
  <!-- Panel background label -->
  <text id="s2_panel_top_label" x="970" y="115" font-family="'Patrick Hand',cursive" font-size="22" fill="#888" text-anchor="middle" opacity="0">Before</text>

  <!-- Top panel sand + footprints group -->
  <g id="s2_illust_top" opacity="0" transform="translate(730, 120) scale(2.4)">
