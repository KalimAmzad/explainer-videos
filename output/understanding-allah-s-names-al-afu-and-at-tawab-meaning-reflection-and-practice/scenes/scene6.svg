  <path id="s6_arr1" d="M 220 445 L 220 415" fill="none" stroke="#993344" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arrow_993344)"/>
  <path id="s6_arr2" d="M 480 445 L 480 415" fill="none" stroke="#993344" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arrow_993344)"/>
  <path id="s6_arr3" d="M 730 445 L 730 415" fill="none" stroke="#993344" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arrow_993344)"/>
  <path id="s6_arr4" d="M 1010 445 L 1010 390" fill="none" stroke="#993344" stroke-width="1.8" stroke-linecap="round" marker-end="url(#arrow_993344)"/>

  <!-- Divider line separating illustration from body text -->
  <line id="s6_divider" x1="80" y1="490" x2="1200" y2="490" stroke="#ccb0b8" stroke-width="1.5" stroke-dasharray="6,4" stroke-linecap="round"/>

  <!-- Body text lines -->
  <g clip-path="url(#cp_s6_body1)">
    <text x="640" y="530" text-anchor="middle" font-family="'Caveat',cursive" font-size="34" fill="#333">The Prophet ﷺ said: <tspan font-family="'Permanent Marker',cursive" font-size="30" fill="#993344">Every son of Adam sins</tspan></text>
  </g>
  <g clip-path="url(#cp_s6_body2)">
    <text x="640" y="575" text-anchor="middle" font-family="'Caveat',cursive" font-size="34" fill="#333">But the <tspan font-family="'Permanent Marker',cursive" font-size="30" fill="#993344">best sinners</tspan> are those who repent</text>
  </g>
  <g clip-path="url(#cp_s6_body3)">
    <text x="640" y="620" text-anchor="middle" font-family="'Caveat',cursive" font-size="34" fill="#333">Sin is not the end — it's the <tspan font-family="'Permanent Marker',cursive" font-size="30" fill="#993344">beginning</tspan></text>
  </g>
  <g clip-path="url(#cp_s6_body4)">
    <text x="640" y="662" text-anchor="middle" font-family="'Caveat',cursive" font-size="34" fill="#333">Of a deeper bond with your Lord</text>
  </g>

</g>