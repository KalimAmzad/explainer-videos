  <g id="s6_illust_fig1" opacity="0" transform="translate(170, 270) scale(2.2)">
    <circle cx="50" cy="140" r="8" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="50" y1="148" x2="58" y2="162" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
