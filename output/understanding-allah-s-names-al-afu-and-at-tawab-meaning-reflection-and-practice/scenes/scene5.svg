<g id="scene5" class="scene">

  <!-- Title -->
  <g clip-path="url(#cp_s5_title)">
    <text x="640" y="55" text-anchor="middle" font-family="'Cabin Sketch',cursive" font-size="48" font-weight="700" fill="#1a8a8a">Quranic Reflections</text>
  </g>

  <!-- Wavy underline beneath title -->
  <path id="s5_underline" d="M379 64 Q420 70 460 64 Q500 58 540 64 Q580 70 620 64 Q660 58 700 64 Q740 70 780 64 Q820 58 860 64 Q880 70 901 64" fill="none" stroke="#1a8a8a" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- === LEFT TEXT GROUP (lines 1 & 2) upper-left === -->
  <!-- Line 1: Quran 4:99 — Allah is Afuwwan Qadira -->
  <g clip-path="url(#cp_s5_line1)">
    <text x="60" y="235" font-family="'Caveat',cursive" font-size="32" fill="#333">Quran 4:99 — <tspan font-family="'Permanent Marker',cursive" font-size="28" fill="#1a8a8a">Afuwwan Qadira</tspan></text>
  </g>
  <!-- Line 2: Pardoning & fully Capable of punishing -->
  <g clip-path="url(#cp_s5_line2)">
    <text x="60" y="281" font-family="'Caveat',cursive" font-size="32" fill="#333">Pardoning &amp; fully <tspan font-style="italic" fill="#cc7722">Capable</tspan> of punishing</text>
  </g>

  <!-- Arrow from left text group down to left Quran page -->
  <path id="s5_arrow_left" d="M 280 295 C 280 350 390 390 430 450" fill="none" stroke="#1a8a8a" stroke-width="2.5" stroke-linecap="round" marker-end="url(#arrow_1a8a8a)"/>

  <!-- === RIGHT TEXT GROUP (lines 3 & 4) upper-right === -->
  <!-- Line 3: Quran 2:37 — He is At-Tawab Ar-Rahim -->
  <g clip-path="url(#cp_s5_line3)">
    <text x="720" y="235" font-family="'Caveat',cursive" font-size="32" fill="#333">Quran 2:37 — <tspan font-family="'Permanent Marker',cursive" font-size="28" fill="#1a8a8a">At-Tawab Ar-Rahim</tspan></text>
  </g>
  <!-- Line 4: Accepting repentance with tender mercy -->
  <g clip-path="url(#cp_s5_line4)">
