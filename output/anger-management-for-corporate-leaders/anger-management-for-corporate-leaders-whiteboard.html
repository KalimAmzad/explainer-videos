<g id="scene6" class="scene">
  <g clip-path="url(#cp_scene6_title)">

  <g clip-path="url(#cp_scene6_body1)">

<!-- Progress bar -->
<rect x="0" y="716" width="1280" height="4" fill="#ddd8d0"/>
<rect id="progBar" x="0" y="716" width="0" height="4" fill="#2b7ec2"/>
</svg>
</div>

<div id="controls">
  <button id="btnPlay">&#9654; Play</button>
  <button id="btnReplay">&#8635; Replay</button>
  <input type="range" id="seekBar" min="0" max="60000" value="0" step="100"/>
  <span id="timeDisp">0.0 / 60.0s</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/DrawSVGPlugin.min.js" onerror="console.log('DrawSVGPlugin not available, using fallback')"></script>
<script>
try { if (typeof DrawSVGPlugin !== 'undefined') gsap.registerPlugin(DrawSVGPlugin); } catch(e) {}

document.addEventListener('DOMContentLoaded', () => {
  const TOTAL = 60;
  const seekBar = document.getElementById('seekBar');
  const timeDisp = document.getElementById('timeDisp');
  const btnPlay = document.getElementById('btnPlay');
  let isSeeking = false;

  function drawOn(id, dur, ease) {
    const el = typeof id === 'string' ? document.getElementById(id) : id;
    if (!el) return gsap.to({}, { duration: 0.01 });
    if (typeof DrawSVGPlugin !== 'undefined') {
      gsap.set(el, { drawSVG: '0%' });
      return gsap.to(el, { drawSVG: '100%', duration: dur, ease: ease || 'power1.inOut' });
    }
    const len = el.getTotalLength ? el.getTotalLength() : 500;
    gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
    return gsap.to(el, { strokeDashoffset: 0, duration: dur, ease: ease || 'power1.inOut' });
  }

  function wipe(crId, targetWidth, dur, ease) {
    return gsap.to('#' + crId, {
      attr: { width: targetWidth },
      duration: dur,
      ease: ease || 'power1.inOut'
    });
  }

  function fadeIn(sel, dur) {
    return gsap.to(sel, { opacity: 1, duration: dur || 0.5, ease: 'power2.out' });
  }

  function drawOnGroup(groupId, dur) {
    const group = document.getElementById(groupId);
    if (!group) return gsap.to({}, { duration: 0.01 });
    const children = group.querySelectorAll('path, line, circle, ellipse, polyline, rect');
    if (children.length === 0) return fadeIn('#' + groupId, dur);
    const perChild = dur / children.length;
    const mini = gsap.timeline();
    children.forEach((child, i) => {
      if (child.getTotalLength) {
        const len = child.getTotalLength();
        gsap.set(child, { strokeDasharray: len, strokeDashoffset: len });
        mini.to(child, { strokeDashoffset: 0, duration: Math.max(0.2, perChild), ease: 'power1.inOut' }, i * perChild * 0.7);
      } else {
        gsap.set(child, { opacity: 0 });
        mini.to(child, { opacity: 1, duration: Math.max(0.2, perChild), ease: 'power2.out' }, i * perChild * 0.7);
      }
    });
    return mini;
  }

  // Initialize stroke paths (underlines + old single-path illust)
  document.querySelectorAll('[id$="_illust"], [id$="_underline"]').forEach(el => {
    if (el.getTotalLength) {
      const len = el.getTotalLength();
      gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
    }
  });

  const tl = gsap.timeline({
    paused: true,
    onUpdate() {
      const t = tl.time();
      if (!isSeeking) seekBar.value = Math.round(t * 1000);
      timeDisp.textContent = t.toFixed(1) + ' / ' + TOTAL + 's';
      gsap.set('#progBar', { attr: { width: (t / TOTAL) * 1280 } });
    }
  });


  // ═══ Scene 1: Anger: A Leader's Challenge (0s) ═══
  tl.set('#scene1', { opacity: 1 }, 0.0);
  tl.add(wipe('cr_scene1_title', 743, 1.3), 0.3);
  tl.add(drawOn('scene1_underline', 0.4), 1.8);
  tl.add(wipe('cr_scene1_body0', 430, 0.8), 2.3);
  tl.add(wipe('cr_scene1_body1', 400, 0.8), 3.0);
  // Element 0: Stick figure leader with angry expression
  gsap.set('#scene1_el0', { opacity: 1 });
  tl.add(drawOnGroup('scene1_el0', 1.9), 3.7);
  // Element 1: Group of 4 disheartened team members
  gsap.set('#scene1_el1', { opacity: 1 });
  tl.add(drawOnGroup('scene1_el1', 1.3), 5.0);
  // Element 2: Thought bubble containing broken gavel and graph
  gsap.set('#scene1_el2', { opacity: 1 });
  tl.add(drawOnGroup('scene1_el2', 0.6), 5.8);
  // Element 3: Steam rising from leader's head
  gsap.set('#scene1_el3', { opacity: 1 });
  tl.add(drawOnGroup('scene1_el3', 0.6), 6.2);
  tl.add(wipe('cr_scene1_label0', 96, 0.5), 6.6);
  tl.add(wipe('cr_scene1_label1', 217, 0.5), 7.0);

  // ═══ Scene 2: Spot Your *Triggers* (10s) ═══
  tl.set('#scene1', { opacity: 0 }, 10.0);
  tl.set('#scene2', { opacity: 1 }, 10.0);
  tl.add(wipe('cr_scene2_title', 505, 1.3), 10.3);
  tl.add(drawOn('scene2_underline', 0.4), 11.8);
  tl.add(wipe('cr_scene2_body0', 523, 0.8), 12.3);
  tl.add(wipe('cr_scene2_body1', 446, 0.8), 13.0);
  // Element 0: Large hand-drawn question mark
  gsap.set('#scene2_el0', { opacity: 1 });
  tl.add(drawOnGroup('scene2_el0', 0.9), 13.7);
  // Element 1: Dot underneath the question mark
  gsap.set('#scene2_el1', { opacity: 1 });
  tl.add(drawOnGroup('scene2_el1', 0.9), 14.3);
  // Element 2: Simple line-art head outline of a person
  gsap.set('#scene2_el2', { opacity: 1 });
  tl.add(drawOnGroup('scene2_el2', 0.9), 14.9);
  // Element 3: Cloud-shaped thought bubble frame
  gsap.set('#scene2_el3', { opacity: 1 });
  tl.add(drawOnGroup('scene2_el3', 0.6), 15.5);
  // Element 4: Small clock sketch inside the bubble
  gsap.set('#scene2_el4', { opacity: 1 });
  tl.add(drawOnGroup('scene2_el4', 0.3), 15.8);
  // Element 5: Broken handshake icon representing betrayal
  gsap.set('#scene2_el5', { opacity: 1 });
  tl.add(drawOnGroup('scene2_el5', 0.3), 16.0);
  // Element 6: Dollar sign with a minus sign icon
  gsap.set('#scene2_el6', { opacity: 1 });
  tl.add(drawOnGroup('scene2_el6', 0.3), 16.2);
  // Element 7: Exclamation mark icon for unexpected changes
  gsap.set('#scene2_el7', { opacity: 1 });
  tl.add(drawOnGroup('scene2_el7', 0.3), 16.4);
  tl.add(wipe('cr_scene2_label0', 228, 0.5), 16.6);
  tl.add(wipe('cr_scene2_label1', 129, 0.5), 17.0);
  tl.add(wipe('cr_scene2_label2', 118, 0.5), 17.4);

  // ═══ Scene 3: *Pause*, Don't React (20s) ═══
  tl.set('#scene2', { opacity: 0 }, 20.0);
  tl.set('#scene3', { opacity: 1 }, 20.0);
  tl.add(wipe('cr_scene3_title', 505, 1.3), 20.3);
  tl.add(drawOn('scene3_underline', 0.4), 21.8);
  tl.add(wipe('cr_scene3_body0', 338, 0.8), 22.3);
  tl.add(wipe('cr_scene3_body1', 323, 0.8), 23.0);
  // Element 0: Stick figure meditating in lotus position with arms resting on knees
  gsap.set('#scene3_el0', { opacity: 1 });
  tl.add(drawOnGroup('scene3_el0', 1.3), 23.7);
  // Element 1: Elongated oval cushion with internal hatch lines
  gsap.set('#scene3_el1', { opacity: 1 });
  tl.add(drawOnGroup('scene3_el1', 0.9), 24.6);
  // Element 2: Cloud-shaped thought bubble outline
  gsap.set('#scene3_el2', { opacity: 1 });
  tl.add(drawOnGroup('scene3_el2', 0.9), 25.2);
  // Element 3: Octagonal frame for the STOP sign
  gsap.set('#scene3_el3', { opacity: 1 });
  tl.add(drawOnGroup('scene3_el3', 0.9), 25.7);
  // Element 4: Curved motion lines near shoulders and hips
  gsap.set('#scene3_el4', { opacity: 1 });
  tl.add(drawOnGroup('scene3_el4', 0.5), 26.3);
  tl.add(wipe('cr_scene3_label0', 151, 0.5), 26.6);
  tl.add(wipe('cr_scene3_label1', 74, 0.5), 27.0);

  // ═══ Scene 4: *Express* Not Explode (30s) ═══
  tl.set('#scene3', { opacity: 0 }, 30.0);
  tl.set('#scene4', { opacity: 1 }, 30.0);
  tl.add(wipe('cr_scene4_title', 532, 1.3), 30.3);
  tl.add(drawOn('scene4_underline', 0.4), 31.8);
  tl.add(wipe('cr_scene4_body0', 316, 0.8), 32.3);
  tl.add(wipe('cr_scene4_body1', 330, 0.8), 33.0);
  // Element 0: The jagged outline of the aggressive speech bubble on the left
  gsap.set('#scene4_el0', { opacity: 1 });
  tl.add(drawOnGroup('scene4_el0', 1.6), 33.7);
  // Element 1: The smooth, rounded outline of the calm speech bubble on the right
  gsap.set('#scene4_el1', { opacity: 1 });
  tl.add(drawOnGroup('scene4_el1', 1.6), 34.7);
  // Element 2: Vertical line separating the two bubbles
  gsap.set('#scene4_el2', { opacity: 1 });
  tl.add(drawOnGroup('scene4_el2', 0.3), 35.8);
  // Element 3: Internal cross-hatching shading for the aggressive bubble
  gsap.set('#scene4_el3', { opacity: 1 });
  tl.add(drawOnGroup('scene4_el3', 0.5), 36.0);
  // Element 4: Internal edge shading lines for the calm speech bubble
  gsap.set('#scene4_el4', { opacity: 1 });
  tl.add(drawOnGroup('scene4_el4', 0.5), 36.3);
  tl.add(wipe('cr_scene4_label0', 184, 0.5), 36.6);
  tl.add(wipe('cr_scene4_label1', 239, 0.5), 37.0);

  // ═══ Scene 5: Build *Resilience* (40s) ═══
  tl.set('#scene4', { opacity: 0 }, 40.0);
  tl.set('#scene5', { opacity: 1 }, 40.0);
  tl.add(wipe('cr_scene5_title', 452, 1.3), 40.3);
  tl.add(drawOn('scene5_underline', 0.4), 41.8);
  tl.add(wipe('cr_scene5_body0', 307, 0.8), 42.3);
  tl.add(wipe('cr_scene5_body1', 353, 0.8), 43.0);
  // Element 0: Central stylized brain shape
  gsap.set('#scene5_el0', { opacity: 1 });
  tl.add(drawOnGroup('scene5_el0', 1.1), 43.7);
  // Element 1: Two gears at the top of the brain with motion lines
  gsap.set('#scene5_el1', { opacity: 1 });
  tl.add(drawOnGroup('scene5_el1', 0.8), 44.4);
  // Element 2: Three leaves sprouting from the brain
  gsap.set('#scene5_el2', { opacity: 1 });
  tl.add(drawOnGroup('scene5_el2', 0.8), 44.9);
  // Element 3: Small kettlebell weight icon below brain
  gsap.set('#scene5_el3', { opacity: 1 });
  tl.add(drawOnGroup('scene5_el3', 0.8), 45.4);
  // Element 4: Lotus flower icon at the bottom
  gsap.set('#scene5_el4', { opacity: 1 });
  tl.add(drawOnGroup('scene5_el4', 0.8), 45.9);
  // Element 5: Diagonal hatching lines inside brain and kettlebell
  gsap.set('#scene5_el5', { opacity: 1 });
  tl.add(drawOnGroup('scene5_el5', 0.4), 46.4);
  tl.add(wipe('cr_scene5_label0', 272, 0.5), 46.6);
  tl.add(wipe('cr_scene5_label1', 129, 0.5), 47.0);

  // ═══ Scene 6: Lead with *Calm* (50s) ═══
  tl.set('#scene5', { opacity: 0 }, 50.0);
  tl.set('#scene6', { opacity: 1 }, 50.0);
  tl.add(wipe('cr_scene6_title', 400, 1.3), 50.3);
  tl.add(drawOn('scene6_underline', 0.4), 51.8);
  tl.add(wipe('cr_scene6_body0', 492, 0.8), 52.3);
  tl.add(wipe('cr_scene6_body1', 384, 0.8), 53.0);
  // Element 0: Stick figure leader standing confidently with hands on hips
  gsap.set('#scene6_el0', { opacity: 1 });
  tl.add(drawOnGroup('scene6_el0', 1.9), 53.7);
  // Element 1: Large upward pointing arrow with hatching
  gsap.set('#scene6_el1', { opacity: 1 });
  tl.add(drawOnGroup('scene6_el1', 0.6), 55.0);
  // Element 2: Interlocked hands symbol
  gsap.set('#scene6_el2', { opacity: 1 });
  tl.add(drawOnGroup('scene6_el2', 0.6), 55.4);
  // Element 3: Five additional stick figures interacting in a circle around the leader
  gsap.set('#scene6_el3', { opacity: 1 });
  tl.add(drawOnGroup('scene6_el3', 1.3), 55.8);
  tl.add(wipe('cr_scene6_label0', 206, 0.5), 56.6);
  tl.add(wipe('cr_scene6_label1', 195, 0.5), 57.0);
  tl.add(wipe('cr_scene6_label2', 228, 0.5), 57.4);


  // Hold final frame
  tl.to({}, { duration: 1.0 }, 59.0);

  // Controls
  btnPlay.addEventListener('click', () => {
    if (tl.isActive()) {
      tl.pause();
      btnPlay.textContent = '\u25B6 Play';
    } else {
      tl.play();
      btnPlay.textContent = '\u23F8 Pause';
    }
  });

  document.getElementById('btnReplay').addEventListener('click', () => {
    document.querySelectorAll('.scene').forEach(s => gsap.set(s, { opacity: 0 }));
    document.querySelectorAll('[id^="cr_"]').forEach(r => r.setAttribute('width', '0'));
    document.querySelectorAll('[id$="_illust"], [id$="_underline"]').forEach(el => {
      if (el.getTotalLength) {
        const len = el.getTotalLength();
        gsap.set(el, { strokeDasharray: len, strokeDashoffset: len, opacity: 0 });
      }
    });
    // Reset multi-element illustrations
    document.querySelectorAll('.illust-el').forEach(g => {
      gsap.set(g, { opacity: 0 });
      g.querySelectorAll('path, line, circle, ellipse, polyline, rect').forEach(child => {
        if (child.getTotalLength) {
          const len = child.getTotalLength();
          gsap.set(child, { strokeDasharray: len, strokeDashoffset: len });
        }
        gsap.set(child, { opacity: 1 });
      });
    });
    gsap.set('#progBar', { attr: { width: 0 } });
    tl.seek(0).restart();
    btnPlay.textContent = '\u23F8 Pause';
  });

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    tl.seek(seekBar.value / 1000).pause();
    btnPlay.textContent = '\u25B6 Play';
    setTimeout(() => { isSeeking = false; }, 100);
  });

  setTimeout(() => {
    tl.play();
    btnPlay.textContent = '\u23F8 Pause';
  }, 800);
});
</script>
