<rect x="0" y="764" width="1408" height="4" fill="#ddd8d0"/>

</svg>
</div>

<div id="controls">
  <button id="btnPlay">&#9654; Play</button>
  <button id="btnReplay">&#8635; Replay</button>
  <input type="range" id="seekBar" min="0" max="26000" value="0" step="100"/>
  <span id="timeDisp">0.0 / 26.0s</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/DrawSVGPlugin.min.js" onerror="console.log('DrawSVGPlugin not available, using fallback')"></script>
<script>
try { if (typeof DrawSVGPlugin !== 'undefined') gsap.registerPlugin(DrawSVGPlugin); } catch(e) {}

document.addEventListener('DOMContentLoaded', () => {
  const TOTAL = 26;
  const seekBar = document.getElementById('seekBar');
  const timeDisp = document.getElementById('timeDisp');
  const btnPlay = document.getElementById('btnPlay');
  let isSeeking = false;

  // ── Utility Functions ──
  function drawOn(id, dur, ease) {
    const el = typeof id === 'string' ? document.getElementById(id) : id;
    if (!el) return gsap.to({}, { duration: 0.01 });
    if (typeof DrawSVGPlugin !== 'undefined') {
      gsap.set(el, { drawSVG: '0%' });
      return gsap.to(el, { drawSVG: '100%', duration: dur, ease: ease || 'power1.inOut' });
    }
    const len = el.getTotalLength ? el.getTotalLength() : 500;
    gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
    return gsap.to(el, { strokeDashoffset: 0, duration: dur, ease: ease || 'power1.inOut' });
  }

  function wipeReveal(crId, targetWidth, dur, ease) {
    return gsap.to('#' + crId, {
      attr: { width: targetWidth },
      duration: dur,
      ease: ease || 'power1.inOut'
    });
  }

  function fadeIn(sel, dur) {
    return gsap.to(sel, { opacity: 1, duration: dur || 0.5, ease: 'power2.out' });
  }

  // ── Initialize stroke paths (hide via dashoffset) ──
  document.querySelectorAll('[id^="stroke_"]').forEach(el => {
    if (el.getTotalLength) {
      const len = el.getTotalLength();
      gsap.set(el, { strokeDasharray: len, strokeDashoffset: len });
    }
  });

  // ── Master Timeline ──
  const tl = gsap.timeline({
    paused: true,
    onUpdate() {
      const t = tl.time();
      if (!isSeeking) seekBar.value = Math.round(t * 1000);
      timeDisp.textContent = t.toFixed(1) + ' / ' + TOTAL + 's';
      gsap.set('#progBar', { attr: { width: (t / TOTAL) * 1408 } });
    }
  });


  // ═══ title (0.0s) ═══
  tl.add(fadeIn('#bg_title_banner', 0.6), 0.0);
  tl.add(wipeReveal('cr_title_banner', 1428, 1.5), 0.4);

  // ═══ section_1 (2.1s) ═══
  gsap.set('#stroke_s1_cognitive_container', { opacity: 1 });
  tl.add(drawOn('stroke_s1_cognitive_container', 1.2), 2.1);
  gsap.set('#stroke_s1_environmental_container', { opacity: 1 });
  tl.add(drawOn('stroke_s1_environmental_container', 1.2), 2.9);
  tl.add(fadeIn('#asset_s1_cognitive_badge', 0.4), 3.8);
  tl.add(fadeIn('#asset_s1_environmental_badge', 0.4), 4.0);
  tl.add(wipeReveal('cr_s1_cognitive_title', 295, 0.8), 4.3);
  gsap.set('#stroke_s1_cognitive_illustration', { opacity: 1 });
  tl.add(drawOn('stroke_s1_cognitive_illustration', 1.5), 4.9);
  tl.add(fadeIn('#fills_s1_cognitive_illustration', 0.8), 5.8);
  gsap.set('#stroke_s1_environmental_illustration', { opacity: 1 });
  tl.add(drawOn('stroke_s1_environmental_illustration', 1.5), 6.4);
  tl.add(fadeIn('#fills_s1_environmental_illustration', 0.8), 7.3);

  // ═══ section_2 (8.4s) ═══
  gsap.set('#stroke_s2_container', { opacity: 1 });
  tl.add(drawOn('stroke_s2_container', 1.2), 8.4);
  tl.add(fadeIn('#asset_s2_badge', 0.4), 9.2);
  tl.add(wipeReveal('cr_s2_title', 302, 0.8), 9.4);
  tl.add(fadeIn('#asset_s2_illustration', 1.2), 10.0);

  // ═══ section_3 (11.3s) ═══
  gsap.set('#stroke_s3_container', { opacity: 1 });
  tl.add(drawOn('stroke_s3_container', 1.2), 11.3);
  tl.add(fadeIn('#asset_s3_badge', 0.4), 12.1);
  tl.add(wipeReveal('cr_s3_title', 273, 0.8), 12.3);
  tl.add(fadeIn('#asset_s3_illustration', 1.2), 12.9);

  // ═══ section_4 (14.2s) ═══
  gsap.set('#stroke_s4_container', { opacity: 1 });
  tl.add(drawOn('stroke_s4_container', 1.2), 14.2);
  tl.add(fadeIn('#asset_s4_badge', 0.4), 15.0);
  tl.add(wipeReveal('cr_s4_title', 302, 0.8), 15.2);
  tl.add(fadeIn('#asset_s4_illustration', 1.2), 15.8);

  // ═══ section_5 (17.1s) ═══
  gsap.set('#stroke_s5_container', { opacity: 1 });
  tl.add(drawOn('stroke_s5_container', 1.2), 17.1);
  tl.add(fadeIn('#asset_s5_badge', 0.4), 17.9);
  tl.add(wipeReveal('cr_s5_title', 302, 0.8), 18.1);
  gsap.set('#stroke_s5_illustration', { opacity: 1 });
  tl.add(drawOn('stroke_s5_illustration', 1.5), 18.7);
  tl.add(fadeIn('#fills_s5_illustration', 0.8), 19.6);

  // ═══ connector (20.7s) ═══
  gsap.set('#stroke_arrow_s1_cognitive_to_s2', { opacity: 1 });
  tl.add(drawOn('stroke_arrow_s1_cognitive_to_s2', 0.6), 20.7);
  gsap.set('#stroke_arrow_s1_cognitive_to_s1_environmental', { opacity: 1 });
  tl.add(drawOn('stroke_arrow_s1_cognitive_to_s1_environmental', 0.6), 21.2);
  gsap.set('#stroke_arrow_s1_environmental_to_s3', { opacity: 1 });
  tl.add(drawOn('stroke_arrow_s1_environmental_to_s3', 0.6), 21.6);
  gsap.set('#stroke_arrow_s2_to_s3', { opacity: 1 });
  tl.add(drawOn('stroke_arrow_s2_to_s3', 0.6), 22.0);
  gsap.set('#stroke_arrow_s3_to_s4', { opacity: 1 });
  tl.add(drawOn('stroke_arrow_s3_to_s4', 0.6), 22.4);
  gsap.set('#stroke_arrow_s3_to_s5', { opacity: 1 });
  tl.add(drawOn('stroke_arrow_s3_to_s5', 0.6), 22.8);
  gsap.set('#stroke_arrow_s5_to_s4', { opacity: 1 });
  tl.add(drawOn('stroke_arrow_s5_to_s4', 0.6), 23.3);


  // Hold final frame
  tl.to({}, { duration: 1.5 }, 24.5);

  // ── Controls ──
  btnPlay.addEventListener('click', () => {
    if (tl.isActive()) {
      tl.pause();
      btnPlay.textContent = '\u25B6 Play';
    } else {
      tl.play();
      btnPlay.textContent = '\u23F8 Pause';
    }
  });

  document.getElementById('btnReplay').addEventListener('click', () => {
    // Reset all clip rects
    document.querySelectorAll('[id^="cr_"]').forEach(r => r.setAttribute('width', '0'));
    // Reset all stroke elements
    document.querySelectorAll('[id^="stroke_"]').forEach(el => {
      if (el.getTotalLength) {
        const len = el.getTotalLength();
        gsap.set(el, { strokeDasharray: len, strokeDashoffset: len, opacity: 0 });
      }
    });
    // Reset all fill/fade elements
    document.querySelectorAll('[id^="fills_"], [id^="asset_"], [id^="bg_"]').forEach(el => {
      gsap.set(el, { opacity: 0 });
    });
    gsap.set('#progBar', { attr: { width: 0 } });
    tl.seek(0).restart();
    btnPlay.textContent = '\u23F8 Pause';
  });

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    tl.seek(seekBar.value / 1000).pause();
    btnPlay.textContent = '\u25B6 Play';
    setTimeout(() => { isSeeking = false; }, 100);
  });

  // Auto-play after fonts load
  setTimeout(() => {
    tl.play();
    btnPlay.textContent = '\u23F8 Pause';
  }, 800);
});
</script>
</body>
</html>
