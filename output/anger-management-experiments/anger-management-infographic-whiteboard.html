* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.wrap {
  width: 100vw; max-width: 1280px;
  aspect-ratio: 16/9; position: relative;
  border-radius: 6px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
}
#board { width: 100%; height: 100%; display: block; }
#controls {
  margin-top: 10px; display: flex; gap: 10px; align-items: center;
}
#controls button {
  padding: 7px 18px; background: #1a6b6a; color: #fff;
  border: none; border-radius: 5px; font-size: 13px; cursor: pointer;
  transition: background 0.2s; font-family: 'Patrick Hand', cursive;
}
#controls button:hover { background: #14524f; }
#timeDisp { color: #888; font: 13px/1 monospace; min-width: 110px; }
#seekBar { width: 360px; cursor: pointer; accent-color: #1a6b6a; }
</style>

      <path id="s5_i3" d="M222,40 L234,46" stroke="#2b7ec2" stroke-width="2"/>
      <path id="s5_i4" d="M222,20 L222,22 M222,58 L222,60 M202,40 L204,40 M242,40 L244,40" stroke="#2b7ec2" stroke-width="1.5"/>
      <!-- Moon -->
      <path id="s5_i5" d="M228,108 C218,98 218,80 228,70 C213,73 203,86 203,98 C203,113 215,123 230,123 C237,123 244,120 248,116 C241,120 233,116 228,108Z" stroke="#7a5bad" stroke-width="2"/>
      <!-- Stars -->
      <path id="s5_i6" d="M252,78 L254,83 L259,83 L255,86 L257,91 L252,88 L247,91 L249,86 L245,83 L250,83Z" stroke="#7a5bad" stroke-width="1.5"/>
      <circle id="s5_i7" cx="264" cy="93" r="1.5" stroke="#7a5bad" stroke-width="1.2"/>
      <!-- Heart -->
      <path id="s5_i8" d="M218,155 C213,147 201,145 198,153 C195,160 198,167 218,183 C238,167 241,160 238,153 C235,145 223,147 218,155Z" stroke="#cc3333" stroke-width="2"/>
    </g>
  </g>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!--  CONNECTING ARROWS                               -->
<!-- ═══════════════════════════════════════════════ -->
<g id="g_arrows" fill="none" stroke="#1a6b6a" stroke-width="3" stroke-linecap="round">
  <path id="arrow_1_2" d="M400,212 C412,196 428,196 440,212" marker-end="url(#arrowTeal)"/>
  <path id="arrow_2_3" d="M580,352 C568,368 498,378 450,395" marker-end="url(#arrowTeal)"/>
  <path id="arrow_3_4" d="M610,500 C680,445 790,310 860,220" marker-end="url(#arrowTeal)"/>
  <path id="arrow_4_5" d="M1000,352 C988,372 870,390 830,408" marker-end="url(#arrowTeal)"/>
</g>

<!-- Progress bar -->
<rect x="0" y="716" width="1280" height="4" fill="#ddd8d0"/>
<rect id="progBar" x="0" y="716" width="0" height="4" fill="#1a6b6a"/>
</svg>
</div>

<div id="controls">
  <button id="btnPlay">&#9654; Play</button>
  <button id="btnReplay">&#8635; Replay</button>
  <input type="range" id="seekBar" min="0" max="55000" value="0" step="100"/>
  <span id="timeDisp">0.0 / 55s</span>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
<script>
if (typeof DrawSVGPlugin !== 'undefined') gsap.registerPlugin(DrawSVGPlugin);

document.addEventListener('DOMContentLoaded', () => {
  const TOTAL = 55;
  const board = document.getElementById('board');
  const seekBar = document.getElementById('seekBar');
  const timeDisp = document.getElementById('timeDisp');
  const btnPlay = document.getElementById('btnPlay');
  let isSeeking = false;

  // ── Rough.js Setup ──
  const rc = rough.svg(board);

  // ── Utility Functions ──

  function drawOn(el, dur, ease) {
    if (typeof el === 'string') el = document.getElementById(el);
    if (!el) return gsap.to({}, { duration: 0.01 });
    if (typeof DrawSVGPlugin !== 'undefined') {
      return gsap.fromTo(el, { drawSVG: '0%' }, { drawSVG: '100%', duration: dur, ease: ease || 'power1.inOut' });
    }
    const len = el.getTotalLength ? el.getTotalLength() : 500;
    return gsap.fromTo(el, { strokeDasharray: len, strokeDashoffset: len }, { strokeDashoffset: 0, duration: dur, ease: ease || 'power1.inOut' });
  }

  function staggerDraw(ids, dur, stag, ease) {
    const tl2 = gsap.timeline();
    ids.forEach((id, i) => { tl2.add(drawOn(id, dur, ease), i * (stag || 0.12)); });
    return tl2;
  }

  function wipe(clipRectId, targetWidth, dur, ease) {
    return gsap.fromTo('#' + clipRectId,
      { attr: { width: 0 } },
      { attr: { width: targetWidth }, duration: dur, ease: ease || 'power1.inOut' });
  }

  function fadeIn(sel, dur) {
    return gsap.fromTo(sel, { opacity: 0 }, { opacity: 1, duration: dur || 0.5, ease: 'power2.out' });
  }

  function show(sel) { gsap.set(sel, { opacity: 1 }); }

  // ── Generate Rough.js Shapes ──

  // Banner background
  const bannerBg = rc.rectangle(0, 0, 1280, 58, {
    roughness: 0.6, stroke: '#15585a', strokeWidth: 1.5,
    fill: '#1a6b6a', fillStyle: 'solid', bowing: 0.8
  });
  bannerBg.id = 'rough_banner';
  bannerBg.setAttribute('opacity', '0');
  document.getElementById('g_banner').insertBefore(bannerBg, document.getElementById('g_banner').firstChild);

  // Step boxes and badges
  const stepBoxes = [
    { x: 30,  y: 72,  w: 370, h: 280 },
    { x: 440, y: 72,  w: 370, h: 280 },
    { x: 240, y: 380, w: 370, h: 280 },
    { x: 860, y: 72,  w: 380, h: 280 },
    { x: 660, y: 380, w: 380, h: 280 },
  ];

  stepBoxes.forEach((b, i) => {
    const n = i + 1;
    const box = rc.rectangle(b.x, b.y, b.w, b.h, {
      roughness: 1.5, stroke: '#c0bdb5', strokeWidth: 1.5,
      fill: 'rgba(255,255,255,0.35)', fillStyle: 'solid', bowing: 2
    });
    box.id = 'rough_box_' + n;
    box.setAttribute('opacity', '0');
    const gStep = document.getElementById('g_step' + n);
    gStep.insertBefore(box, gStep.firstChild);

    const badge = rc.circle(b.x + 15, b.y + 16, 34, {
      roughness: 1, stroke: '#c06020', strokeWidth: 2,
      fill: '#d4762c', fillStyle: 'solid', bowing: 1
    });
    badge.id = 'rough_badge_' + n;
    badge.setAttribute('opacity', '0');
    gStep.appendChild(badge);
  });

  // ── Master Timeline ──
  const tl = gsap.timeline({
    paused: true,
    onUpdate() {
      const t = tl.time();
      if (!isSeeking) seekBar.value = Math.round(t * 1000);
      timeDisp.textContent = t.toFixed(1) + ' / ' + TOTAL + 's';
      gsap.set('#progBar', { attr: { width: (t / TOTAL) * 1280 } });
    }
  });

  // ═══════════════════════════════════════════
  //  BANNER  (0s → 4s)
  // ═══════════════════════════════════════════
  tl.call(() => show('#g_banner'), null, 0);
  tl.add(fadeIn('#rough_banner', 0.8), 0.2);    // 0.2-1.0s banner bg
  tl.add(wipe('cr_banner', 1000, 1.5), 1.2);    // 1.2-2.7s title text

  // ═══════════════════════════════════════════
  //  STEP 1: RECOGNIZE TRIGGERS  (5s → 14s)
  // ═══════════════════════════════════════════
  tl.call(() => show('#g_step1'), null, 5);
  tl.add(fadeIn('#rough_box_1', 0.5), 5);           // 5-5.5s box
  tl.add(fadeIn('#rough_badge_1', 0.4), 5.5);       // 5.5-5.9s badge
  tl.add(fadeIn('#badge1', 0.3), 5.7);              // 5.7-6.0s number
  tl.add(wipe('cr_s1', 280, 1.0), 6.5);            // 6.5-7.5s title

  tl.call(() => show('#s1_illust'), null, 7.8);
  // 8-10s: Brain outlines draw on
  tl.add(staggerDraw(['s1_p1','s1_p2','s1_p3','s1_p4','s1_p5','s1_p6','s1_p7','s1_p8','s1_p9'], 0.35, 0.18), 8);
  // 10-10.8s: Brain fill
  tl.add(fadeIn('#s1_fill', 0.8), 10);
  // 11-12s: Lightning bolts
  tl.add(staggerDraw(['s1_b1','s1_b2','s1_b3'], 0.4, 0.25), 11);
  // 12-13.5s: Trigger icons
  tl.add(staggerDraw(['s1_i1','s1_i2','s1_i3','s1_i4','s1_i5','s1_i6','s1_i7'], 0.25, 0.12), 12);

  // 13.5s: Arrow 1→2
  tl.add(drawOn('arrow_1_2', 1.0), 13.5);

  // ═══════════════════════════════════════════
  //  STEP 2: PAUSE & BREATHE  (15s → 24s)
  // ═══════════════════════════════════════════
  tl.call(() => show('#g_step2'), null, 15);
  tl.add(fadeIn('#rough_box_2', 0.5), 15);
  tl.add(fadeIn('#rough_badge_2', 0.4), 15.5);
  tl.add(fadeIn('#badge2', 0.3), 15.7);
  tl.add(wipe('cr_s2', 260, 1.0), 16.5);

  tl.call(() => show('#s2_illust'), null, 17.3);
  // 17.5-19.5s: Meditator outlines
  tl.add(staggerDraw(['s2_p1','s2_p2','s2_p3','s2_p4','s2_p5','s2_p6','s2_p7','s2_p8','s2_p9','s2_p10','s2_p11','s2_p12','s2_p13','s2_p14','s2_p15'], 0.25, 0.12), 17.5);
  // 19.5s: Fills
  tl.add(fadeIn('#s2_fill', 0.8), 19.5);
  // 20.5s: Thought bubbles
  tl.add(staggerDraw(['s2_b1','s2_b2','s2_b3','s2_b4','s2_b5','s2_b6','s2_b7','s2_b8','s2_b9'], 0.25, 0.12), 20.5);

  // 23.5s: Arrow 2→3
  tl.add(drawOn('arrow_2_3', 1.0), 23.5);

  // ═══════════════════════════════════════════
  //  STEP 3: REFRAME THE SITUATION  (25s → 34s)
  // ═══════════════════════════════════════════
  tl.call(() => show('#g_step3'), null, 25);
  tl.add(fadeIn('#rough_box_3', 0.5), 25);
  tl.add(fadeIn('#rough_badge_3', 0.4), 25.5);
  tl.add(fadeIn('#badge3', 0.3), 25.7);
  tl.add(wipe('cr_s3', 350, 1.0), 26.5);

  tl.call(() => show('#s3_illust'), null, 27.3);
  tl.add(staggerDraw(['s3_p1','s3_p2','s3_p3','s3_p4','s3_p5','s3_p6','s3_p7','s3_p8','s3_p9','s3_p10','s3_p11','s3_p12'], 0.3, 0.12), 27.5);
  tl.add(fadeIn('#s3_fill', 0.8), 29.5);
  // 30.5s: Thought bubbles (negative, positive, arrow)
  tl.add(staggerDraw(['s3_b1','s3_b2','s3_b3','s3_b4','s3_b5','s3_b6','s3_b7','s3_b8','s3_b9','s3_b10'], 0.25, 0.12), 30.5);

  // 33.5s: Arrow 3→4
  tl.add(drawOn('arrow_3_4', 1.0), 33.5);

  // ═══════════════════════════════════════════
  //  STEP 4: COMMUNICATE ASSERTIVELY  (35s → 44s)
  // ═══════════════════════════════════════════
  tl.call(() => show('#g_step4'), null, 35);
  tl.add(fadeIn('#rough_box_4', 0.5), 35);
  tl.add(fadeIn('#rough_badge_4', 0.4), 35.5);
  tl.add(fadeIn('#badge4', 0.3), 35.7);
  tl.add(wipe('cr_s4', 380, 1.0), 36.5);

  tl.call(() => show('#s4_illust'), null, 37.3);
  tl.add(staggerDraw(['s4_p1','s4_p2','s4_p3','s4_p4','s4_p5','s4_p6','s4_p7','s4_p8','s4_p9','s4_p10','s4_p11','s4_p12','s4_p13','s4_p14','s4_p15','s4_p16'], 0.25, 0.1), 37.5);
  tl.add(fadeIn('#s4_fill', 0.8), 39.5);
  // 40.5s: Speech bubbles
  tl.add(staggerDraw(['s4_b1','s4_b2','s4_b3','s4_b4','s4_b5'], 0.3, 0.18), 40.5);

  // 43.5s: Arrow 4→5
  tl.add(drawOn('arrow_4_5', 1.0), 43.5);

  // ═══════════════════════════════════════════
  //  STEP 5: PRACTICE SELF-CARE  (45s → 54s)
  // ═══════════════════════════════════════════
  tl.call(() => show('#g_step5'), null, 45);
  tl.add(fadeIn('#rough_box_5', 0.5), 45);
  tl.add(fadeIn('#rough_badge_5', 0.4), 45.5);
  tl.add(fadeIn('#badge5', 0.3), 45.7);
  tl.add(wipe('cr_s5', 320, 1.0), 46.5);

  tl.call(() => show('#s5_illust'), null, 47.3);
  tl.add(staggerDraw(['s5_p1','s5_p2','s5_p3','s5_p4','s5_p5','s5_p6','s5_p7','s5_p8','s5_p9','s5_p10','s5_p11','s5_p12'], 0.25, 0.1), 47.5);
  tl.add(fadeIn('#s5_fill', 0.8), 49);
  // Speed lines
  tl.add(staggerDraw(['s5_sp1','s5_sp2','s5_sp3'], 0.2, 0.1), 49.5);
  // Icons: clock, moon, heart
  tl.add(staggerDraw(['s5_i1','s5_i2','s5_i3','s5_i4','s5_i5','s5_i6','s5_i7','s5_i8'], 0.3, 0.12), 50);

  // Hold final frame
  tl.to({}, { duration: 2 }, TOTAL - 2);

  // ── Controls ──
  btnPlay.addEventListener('click', () => {
    if (tl.isActive()) {
      tl.pause();
      btnPlay.textContent = '\u25B6 Play';
    } else {
      tl.play();
      btnPlay.textContent = '\u23F8 Pause';
    }
  });

  document.getElementById('btnReplay').addEventListener('click', () => {
    tl.seek(0).pause();
    // Reset all groups to hidden
    ['g_banner','g_step1','g_step2','g_step3','g_step4','g_step5'].forEach(id => {
      gsap.set('#' + id, { opacity: 0 });
    });
    ['s1_illust','s2_illust','s3_illust','s4_illust','s5_illust'].forEach(id => {
      gsap.set('#' + id, { opacity: 0 });
    });
    ['s1_fill','s2_fill','s3_fill','s4_fill','s5_fill'].forEach(id => {
      gsap.set('#' + id, { opacity: 0 });
    });
    ['badge1','badge2','badge3','badge4','badge5'].forEach(id => {
      gsap.set('#' + id, { opacity: 0 });
    });
    // Reset clip rects
    document.querySelectorAll('[id^="cr_"]').forEach(r => r.setAttribute('width', '0'));
    // Reset rough shapes
    for (let i = 1; i <= 5; i++) {
      gsap.set('#rough_box_' + i, { opacity: 0 });
      gsap.set('#rough_badge_' + i, { opacity: 0 });
    }
    gsap.set('#rough_banner', { opacity: 0 });
    gsap.set('#progBar', { attr: { width: 0 } });
    tl.restart();
    btnPlay.textContent = '\u23F8 Pause';
  });

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    tl.seek(seekBar.value / 1000).pause();
    btnPlay.textContent = '\u25B6 Play';
    setTimeout(() => { isSeeking = false; }, 100);
  });

  // Auto-play after fonts load
  setTimeout(() => {
    tl.play();
    btnPlay.textContent = '\u23F8 Pause';
  }, 800);
});
</script>
</body>
</html>
