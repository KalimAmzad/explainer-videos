<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 200">
  <!-- Woman in contemplative side-view with thought bubbles -->
  <g class="outlines" fill="none" stroke="#333" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
    <!-- Head (3/4 view, looking right) -->
    <path class="stroke-path" d="M120,50 C120,28 138,15 155,15 C172,15 185,28 185,50 C185,65 175,78 160,82 L148,82 C133,78 120,65 120,50Z"/>
    <!-- Hair (updo) -->
    <path class="stroke-path" d="M125,42 C120,22 135,10 155,10 C170,10 182,18 185,35"/>
    <path class="stroke-path" d="M155,10 C158,2 168,0 172,5 C178,2 183,6 180,12"/>
    <!-- Eye (one visible in 3/4 view) -->
    <circle class="stroke-path" cx="160" cy="45" r="3"/>
    <path class="stroke-path" d="M155,45 C157,42 163,42 165,45"/>
    <!-- Eyebrow -->
    <path class="stroke-path" d="M154,38 C158,36 164,36 168,38"/>
    <!-- Nose -->
    <path class="stroke-path" d="M170,48 C173,52 172,58 168,60"/>
    <!-- Mouth (slight, contemplative) -->
    <path class="stroke-path" d="M158,66 C162,68 166,67 168,65"/>
    <!-- Neck -->
    <path class="stroke-path" d="M148,82 L145,100 M160,82 L162,100"/>
    <!-- Shoulders / upper body -->
    <path class="stroke-path" d="M115,108 C125,100 140,96 153,96 C166,96 178,100 190,108 L192,160 L112,160 Z"/>
    <!-- Hand near chin (thinking pose) -->
    <path class="stroke-path" d="M182,108 C190,100 195,90 192,80 L188,75"/>
    <path class="stroke-path" d="M188,75 C185,73 182,75 183,78 L185,82"/>
  </g>

  <!-- Fills -->
  <g class="fill-shape" opacity="0">
    <!-- Skin -->
    <path d="M120,50 C120,28 138,15 155,15 C172,15 185,28 185,50 C185,65 175,78 160,82 L148,82 C133,78 120,65 120,50Z" fill="#8d6344" opacity="0.6"/>
    <!-- Hair -->
    <path d="M125,42 C120,22 135,10 155,10 C170,10 182,18 185,35 L185,50 C185,28 172,15 155,15 C138,15 120,28 120,50 L120,42Z" fill="#2a2a2a" opacity="0.6"/>
    <!-- Clothing -->
    <path d="M115,108 C125,100 140,96 153,96 C166,96 178,100 190,108 L192,160 L112,160 Z" fill="#1a6b6a" opacity="0.5"/>
  </g>

  <!-- Thought bubble group — left (negative/old frame) -->
  <g class="outlines" fill="none" stroke="#cc3333" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <ellipse class="stroke-path" cx="55" cy="40" rx="35" ry="25"/>
    <circle class="stroke-path" cx="85" cy="62" r="5"/>
    <circle class="stroke-path" cx="95" cy="70" r="3"/>
    <!-- X mark inside (negative thought) -->
    <path class="stroke-path" d="M45,30 L65,50 M65,30 L45,50"/>
  </g>

  <!-- Thought bubble group — right (positive/new frame) -->
  <g class="outlines" fill="none" stroke="#3a9e6e" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
    <ellipse class="stroke-path" cx="55" cy="130" rx="35" ry="25"/>
    <circle class="stroke-path" cx="85" cy="115" r="5"/>
    <circle class="stroke-path" cx="95" cy="108" r="3"/>
    <!-- Checkmark inside (positive reframe) -->
    <path class="stroke-path" d="M42,130 L52,140 L68,120"/>
  </g>

  <!-- Arrow from negative to positive -->
  <g class="outlines" fill="none" stroke="#7a5bad" stroke-width="2" stroke-linecap="round">
    <path class="stroke-path" d="M55,68 C55,80 55,105 55,105"/>
    <path class="stroke-path" d="M50,100 L55,108 L60,100"/>
  </g>
</svg>
