<style>
@import url('https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Caveat:wght@400;700&family=Patrick+Hand&family=Permanent+Marker&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.wrap {
  width: 100vw; max-width: 1280px;
  aspect-ratio: 16/9; position: relative;
  border-radius: 6px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
}
#board { width: 100%; height: 100%; display: block; }
.scene { opacity: 0; }
#controls {
  margin-top: 10px; display: flex; gap: 10px; align-items: center;
}
#controls button {
  padding: 7px 18px; background: #2b7ec2; color: #fff;
  border: none; border-radius: 5px; font-size: 13px; cursor: pointer;
  transition: background 0.2s;
}
#controls button:hover { background: #1e5fa0; }
#timeDisp { color: #888; font: 13px/1 monospace; min-width: 90px; }
#seekBar { width: 300px; cursor: pointer; accent-color: #2b7ec2; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
<script>
if (typeof DrawSVGPlugin !== 'undefined') gsap.registerPlugin(DrawSVGPlugin);

document.addEventListener('DOMContentLoaded', () => {
  const TOTAL = 120;
  const board = document.getElementById('board');
  const seekBar = document.getElementById('seekBar');
  const timeDisp = document.getElementById('timeDisp');
  const btnPlay = document.getElementById('btnPlay');
  const progBar = document.getElementById('progBar');
  let isSeeking = false;

  const rc = rough.svg(board);

  // ── Utility Functions ──
  function drawOn(el, dur, ease) {
    if (typeof el === 'string') el = document.getElementById(el);
    if (!el) return gsap.to({}, { duration: 0.01 });
    if (typeof DrawSVGPlugin !== 'undefined') {
      return gsap.fromTo(el, { drawSVG: '0%' }, { drawSVG: '100%', duration: dur, ease: ease || 'power1.inOut' });
    }
    const len = el.getTotalLength ? el.getTotalLength() : 500;
    return gsap.fromTo(el, { strokeDasharray: len, strokeDashoffset: len }, { strokeDashoffset: 0, duration: dur, ease: ease || 'power1.inOut' });
  }

  function wipe(clipRectId, targetWidth, dur, ease) {
    return gsap.to('#' + clipRectId, { attr: { width: targetWidth }, duration: dur, ease: ease || 'power1.inOut' });
  }

  function fadeIn(sel, dur) {
    return gsap.to(sel, { opacity: 1, duration: dur || 0.5, ease: 'power2.out' });
  }

  function showScene(sel) { gsap.set(sel, { opacity: 1 }); }
  function hideScene(sel) { gsap.set(sel, { opacity: 0 }); }

  function addRoughShape(shape, id, parentId) {
    shape.setAttribute('opacity', '0');
    shape.id = id;
    document.getElementById(parentId).appendChild(shape);
    return shape;
  }

  const hachureOpts = (color, fillColor, extra) => Object.assign({
    roughness: 1.8, stroke: color, strokeWidth: 3, fill: fillColor,
    fillStyle: 'hachure', hachureGap: 8, bowing: 2
  }, extra || {});

  const solidOpts = (color, extra) => Object.assign({
    roughness: 1.5, stroke: color, strokeWidth: 2.5, fill: 'none', bowing: 2
  }, extra || {});

  // ── Rough.js Shapes ──
  // Scene 1: Title frame
  addRoughShape(rc.rectangle(200, 220, 880, 250, hachureOpts('#2b7ec2', 'rgba(43,126,194,0.03)', { roughness: 2.2, strokeWidth: 2 })), 'rough_s1_frame', 'scene1');

  // Scene 2: Probability bar outlines (hand-drawn feel)
  addRoughShape(rc.rectangle(695, 345, 80, 200, solidOpts('#1e8c5a', { roughness: 2 })), 'rough_s2_bar1', 'scene2');
  addRoughShape(rc.rectangle(805, 425, 80, 120, solidOpts('#1e8c5a', { roughness: 2 })), 'rough_s2_bar2', 'scene2');
  addRoughShape(rc.rectangle(915, 455, 80, 90, solidOpts('#1e8c5a', { roughness: 2 })), 'rough_s2_bar3', 'scene2');

  // Scene 4: Embedding matrix frame
  addRoughShape(rc.rectangle(75, 195, 130, 190, hachureOpts('#cc7722', 'rgba(204,119,34,0.04)', { roughness: 2.5 })), 'rough_s4_matrix', 'scene4');

  // Scene 6: Transformer block outer frame
  addRoughShape(rc.rectangle(245, 155, 410, 500, solidOpts('#333', { roughness: 2, strokeWidth: 2 })), 'rough_s6_block', 'scene6');

  // Scene 9: Three pipeline boxes
  addRoughShape(rc.rectangle(55, 125, 290, 150, hachureOpts('#1e8c5a', 'rgba(30,140,90,0.04)', { roughness: 2 })), 'rough_s9_pt', 'scene9');
  addRoughShape(rc.rectangle(405, 125, 290, 150, hachureOpts('#cc7722', 'rgba(204,119,34,0.04)', { roughness: 2 })), 'rough_s9_sft', 'scene9');
  addRoughShape(rc.rectangle(755, 125, 290, 150, hachureOpts('#8844aa', 'rgba(136,68,170,0.04)', { roughness: 2 })), 'rough_s9_rlhf', 'scene9');

  // ── Master Timeline ──
  const tl = gsap.timeline({
    paused: true,
    onUpdate() {
      const t = tl.time();
      if (!isSeeking) seekBar.value = Math.round(t * 1000);
      timeDisp.textContent = t.toFixed(1) + ' / ' + TOTAL + 's';
      gsap.set(progBar, { attr: { width: (t / TOTAL) * 1280 } });
    }
  });

  // ═══════════════════════════════════════════
  //  SCENE 1: Title Card (0s → 6s)
  // ═══════════════════════════════════════════
  tl.call(() => showScene('#scene1'), null, 0);
  // 0.3s → 1.8s — Title wipes in
  tl.add(wipe('cr_s1_title', 1100, 1.5), 0.3);
  // 2.0s → 2.8s — Underline draws on
  tl.add(fadeIn('#s1_ul', 0.2), 2.0);
  tl.add(drawOn('s1_ul', 0.8), 2.0);
  // 3.0s → 4.2s — Subtitle wipes in
  tl.add(wipe('cr_s1_sub', 900, 1.2), 3.0);
  // 4.5s → 5.5s — Tag line wipes in
  tl.add(wipe('cr_s1_tag', 900, 1.0), 4.5);
  // 5.0s → 6.0s — Brain illustration fades in
  tl.add(fadeIn('#s1_brain', 1.0), 5.0);
  // 0.2s — Rough title frame fades in
  tl.add(fadeIn('#rough_s1_frame', 1.5), 0.2);

  // ═══════════════════════════════════════════
  //  SCENE 2: Language Model (6s → 18s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene1'); showScene('#scene2'); }, null, 6.0);
  // 6.3s → 7.5s — Title wipes
  tl.add(wipe('cr_s2_title', 500, 1.2), 6.3);
  // 7.8s → 8.8s — Definition wipes
  tl.add(wipe('cr_s2_def', 450, 1.0), 7.8);
  // 9.0s → 10.0s — Formula wipes (red)
  tl.add(wipe('cr_s2_formula', 480, 1.0), 9.0);
  // 10.5s → 11.7s — Sentence wipes
  tl.add(wipe('cr_s2_sent', 620, 1.2), 10.5);
  // 12.0s → 12.6s — Arrow draws on
  tl.add(fadeIn('#s2_arrow', 0.2), 12.0);
  tl.add(drawOn('s2_arrow', 0.6), 12.0);
  // 12.8s → 14.6s — Bars fade in sequentially (with rough overlays)
  tl.add(fadeIn('#s2_bar1', 0.8), 12.8);
  tl.add(fadeIn('#rough_s2_bar1', 0.8), 12.8);
  tl.add(fadeIn('#s2_bar2', 0.8), 13.3);
  tl.add(fadeIn('#rough_s2_bar2', 0.8), 13.3);
  tl.add(fadeIn('#s2_bar3', 0.8), 13.8);
  tl.add(fadeIn('#rough_s2_bar3', 0.8), 13.8);
  // 14.5s → 15.7s — Bar labels wipe
  tl.add(wipe('cr_s2_lbl1', 100, 0.6), 14.5);
  tl.add(wipe('cr_s2_lbl2', 100, 0.6), 14.8);
  tl.add(wipe('cr_s2_lbl3', 100, 0.6), 15.1);
  // 16.5s → 17.5s — Goal text wipes
  tl.add(wipe('cr_s2_goal', 500, 1.0), 16.5);

  // ═══════════════════════════════════════════
  //  SCENE 3: Tokenization (18s → 28s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene2'); showScene('#scene3'); }, null, 18.0);
  // 18.3s → 19.5s — Title wipes
  tl.add(wipe('cr_s3_title', 600, 1.2), 18.3);
  // 19.8s → 20.8s — Word wipes in
  tl.add(wipe('cr_s3_word', 650, 1.0), 19.8);
  // 21.0s → 21.8s — Cut lines draw on
  tl.add(fadeIn('#s3_cut1', 0.2), 21.0);
  tl.add(drawOn('s3_cut1', 0.5), 21.0);
  tl.add(fadeIn('#s3_cut2', 0.2), 21.3);
  tl.add(drawOn('s3_cut2', 0.5), 21.3);
  // 22.0s → 23.4s — Subword boxes and text
  tl.add(fadeIn('#s3_box1', 0.5), 22.0);
  tl.add(wipe('cr_s3_t1', 140, 0.6), 22.0);
  tl.add(fadeIn('#s3_box2', 0.5), 22.4);
  tl.add(wipe('cr_s3_t2', 140, 0.6), 22.4);
  tl.add(fadeIn('#s3_box3', 0.5), 22.8);
  tl.add(wipe('cr_s3_t3', 140, 0.6), 22.8);
  // 23.5s → 24.4s — Arrows draw
  tl.add(fadeIn('#s3_arrows', 0.2), 23.5);
  tl.add(drawOn('s3_arr1', 0.5), 23.5);
  tl.add(drawOn('s3_arr2', 0.5), 23.7);
  tl.add(drawOn('s3_arr3', 0.5), 23.9);
  // 24.5s → 25.6s — Token IDs wipe
  tl.add(fadeIn('#s3_ids', 0.3), 24.5);
  tl.add(wipe('cr_s3_id1', 90, 0.5), 24.5);
  tl.add(wipe('cr_s3_id2', 90, 0.5), 24.8);
  tl.add(wipe('cr_s3_id3', 90, 0.5), 25.1);
  // 26.0s → 26.8s — BPE label
  tl.add(wipe('cr_s3_bpe', 450, 0.8), 26.0);
  // 27.0s → 27.8s — Vocab annotation
  tl.add(wipe('cr_s3_vocab', 400, 0.8), 27.0);

  // ═══════════════════════════════════════════
  //  SCENE 4: Embeddings (28s → 40s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene3'); showScene('#scene4'); }, null, 28.0);
  // 28.3s — Title wipes
  tl.add(wipe('cr_s4_title', 550, 1.2), 28.3);
  // 29.8s — Token label wipes
  tl.add(wipe('cr_s4_tok', 400, 1.0), 29.8);
  // 31.0s — Embedding matrix fades in (with rough overlay)
  tl.add(fadeIn('#s4_matrix', 1.5), 31.0);
  tl.add(fadeIn('#rough_s4_matrix', 1.5), 31.0);
  // 32.5s — Output vector wipes
  tl.add(wipe('cr_s4_vec', 450, 1.0), 32.5);
  // 33.5s — Dimension annotation wipes
  tl.add(wipe('cr_s4_dim', 300, 0.8), 33.5);
  // 34.5s — Axes draw on
  tl.add(fadeIn('#s4_axes', 0.3), 34.5);
  tl.add(drawOn('s4_yaxis', 0.6), 34.5);
  tl.add(drawOn('s4_xaxis', 0.6), 34.8);
  // 35.5s — Word dots fade in
  tl.add(fadeIn('#s4_dots', 1.0), 35.5);
  // 36.5s — Word labels wipe
  tl.add(wipe('cr_s4_w1', 70, 0.5), 36.5);
  tl.add(wipe('cr_s4_w2', 80, 0.5), 36.7);
  tl.add(wipe('cr_s4_w3', 60, 0.5), 36.9);
  tl.add(wipe('cr_s4_w4', 60, 0.5), 37.1);
  tl.add(wipe('cr_s4_w5', 60, 0.5), 37.3);
  tl.add(wipe('cr_s4_w6', 80, 0.5), 37.5);
  // 37.8s — Cluster ovals fade in
  tl.add(fadeIn('#s4_clusters', 0.8), 37.8);
  // 38.5s — Analogy arrow draws
  tl.add(fadeIn('#s4_analogy_arrow', 0.2), 38.5);
  tl.add(drawOn('s4_analogy_arrow', 0.6), 38.5);
  // 38.8s — Analogy text wipes
  tl.add(wipe('cr_s4_analogy', 550, 1.0), 38.8);
  // 39.5s — Summary wipes
  tl.add(wipe('cr_s4_summary', 500, 0.8), 39.5);

  // ═══════════════════════════════════════════
  //  SCENE 5: Attention (40s → 58s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene4'); showScene('#scene5'); }, null, 40.0);

  // ── Part A: Spotlight metaphor ──
  // 40.3s — Title wipes
  tl.add(wipe('cr_s5_title', 600, 1.2), 40.3);
  // 41.8s — Word boxes fade in
  tl.add(fadeIn('#s5_words', 1.0), 41.8);
  // 43.0s — Attention beams draw on (the key visual!)
  tl.add(fadeIn('#s5_beams', 0.3), 43.0);
  tl.add(drawOn('s5_b1', 0.6), 43.0);
  tl.add(drawOn('s5_b2', 0.5), 43.2);
  tl.add(drawOn('s5_b3', 0.5), 43.4);
  tl.add(drawOn('s5_b4', 1.0), 43.6);
  tl.add(drawOn('s5_b5', 0.6), 44.2);
  tl.add(drawOn('s5_b6', 1.0), 44.5);
  // 45.5s — Weight labels fade in
  tl.add(fadeIn('#s5_weights', 0.8), 45.5);
  // 46.5s — Context question wipes
  tl.add(wipe('cr_s5_ctx', 550, 1.0), 46.5);

  // ── Part B: Q, K, V mechanism ──
  // 48.0s — Q box

  tl.add(fadeIn('#s10_blk5', 0.4), 115.3);

  tl.add(drawOn('s10_bracket', 0.8), 117.0);

  tl.add(wipe('cr_s10_eq', 600, 1.2), 117.8);
  // 119.0s — Brain icon fades in
  tl.add(fadeIn('#s10_brain', 0.8), 119.0);

  // Hold final frame
  tl.to({}, { duration: 0.5 }, TOTAL - 0.5);

  // ── Controls ──
  btnPlay.addEventListener('click', () => {
    if (tl.isActive()) { tl.pause(); btnPlay.textContent = '\u25B6 Play'; }
    else { tl.play(); btnPlay.textContent = '\u23F8 Pause'; }
  });

  document.getElementById('btnReplay').addEventListener('click', () => {
    document.querySelectorAll('.scene').forEach(s => gsap.set(s, { opacity: 0 }));
    document.querySelectorAll('[id^="cr_"]').forEach(r => r.setAttribute('width', '0'));
    gsap.set(progBar, { attr: { width: 0 } });
    tl.restart();
    btnPlay.textContent = '\u23F8 Pause';
  });

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    tl.seek(seekBar.value / 1000).pause();
    btnPlay.textContent = '\u25B6 Play';
  });
  seekBar.addEventListener('change', () => { isSeeking = false; });

  document.fonts.ready.then(() => {
    tl.play();
    btnPlay.textContent = '\u23F8 Pause';
  });
});
</script>
</body>
</html>
