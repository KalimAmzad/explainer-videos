<title>Large Language Models from Scratch — Whiteboard Explainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Caveat:wght@400;700&family=Patrick+Hand&family=Permanent+Marker&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.wrap {
  width: 100vw; max-width: 1280px;
  aspect-ratio: 16/9; position: relative;
  border-radius: 6px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
}
#board { width: 100%; height: 100%; display: block; }
.scene { opacity: 0; }
#controls {
  margin-top: 10px; display: flex; gap: 10px; align-items: center;
}
#controls button {
  padding: 7px 18px; background: #2b7ec2; color: #fff;
  border: none; border-radius: 5px; font-size: 13px; cursor: pointer;
  transition: background 0.2s;
}
#controls button:hover { background: #1e5fa0; }
#timeDisp { color: #888; font: 13px/1 monospace; min-width: 110px; }
#seekBar { width: 360px; cursor: pointer; accent-color: #2b7ec2; }
</style>
</head>

<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
<script>
if (typeof DrawSVGPlugin !== 'undefined') gsap.registerPlugin(DrawSVGPlugin);

document.addEventListener('DOMContentLoaded', () => {
  const TOTAL = 300;
  const board = document.getElementById('board');
  const seekBar = document.getElementById('seekBar');
  const timeDisp = document.getElementById('timeDisp');
  const btnPlay = document.getElementById('btnPlay');
  let isSeeking = false;

  // ── Rough.js Setup ──
  const rc = rough.svg(board);

  // ── Utility Functions ──

  /**
   * Stroke draw-on animation.
   * Uses DrawSVGPlugin if available, falls back to strokeDasharray.
   * @param {string|Element} el - Element ID or DOM element
   * @param {number} dur - Duration in seconds
   * @param {string} ease - GSAP ease string
   */
  function drawOn(el, dur, ease) {
    if (typeof el === 'string') el = document.getElementById(el);
    if (!el) return gsap.to({}, { duration: 0.01 });
    if (typeof DrawSVGPlugin !== 'undefined') {
      return gsap.fromTo(el,
        { drawSVG: '0%' },
        { drawSVG: '100%', duration: dur, ease: ease || 'power1.inOut' }
      );
    }
    // Fallback
    const len = el.getTotalLength ? el.getTotalLength() : 500;
    return gsap.fromTo(el,
      { strokeDasharray: len, strokeDashoffset: len },
      { strokeDashoffset: 0, duration: dur, ease: ease || 'power1.inOut' }
    );
  }

  /**
   * Clip-rect text wipe reveal (left to right).
   * @param {string} clipRectId - ID of the clip rect (without #)
   * @param {number} targetWidth - Final width of the clip rect
   * @param {number} dur - Duration in seconds
   * @param {string} ease - GSAP ease string
   */
  function wipe(clipRectId, targetWidth, dur, ease) {
    return gsap.to('#' + clipRectId, {
      attr: { width: targetWidth },
      duration: dur,
      ease: ease || 'power1.inOut'
    });
  }

  /**
   * Fade-in for complex illustration groups.
   * @param {string} sel - CSS selector
   * @param {number} dur - Duration in seconds
   */
  function fadeIn(sel, dur) {
    return gsap.to(sel, { opacity: 1, duration: dur || 0.5, ease: 'power2.out' });
  }

  function showScene(sel) { gsap.set(sel, { opacity: 1 }); }
  function hideScene(sel) { gsap.set(sel, { opacity: 0 }); }

  /**
   * Add a Rough.js shape to a parent element with initial opacity 0.
   * @param {SVGElement} shape - Rough.js generated SVG element
   * @param {string} id - ID to assign to the shape
   * @param {string} parentId - ID of the parent element
   * @returns {SVGElement} The shape element
   */
  function addRoughShape(shape, id, parentId) {
    shape.setAttribute('opacity', '0');
    shape.id = id;
    document.getElementById(parentId).appendChild(shape);
    return shape;
  }

  // ── Generate Rough.js Shapes ──

  // Scene 1 Rough.js: Title frame
  const s1Frame = rc.rectangle(240, 200, 800, 300, {
    roughness: 1.5, stroke: '#2b7ec2', strokeWidth: 2.5, fill: 'none', bowing: 2
  });
  addRoughShape(s1Frame, 'rough_s1_frame', 'scene1');

  // Scene 2 Rough.js shapes
  const s2NgramBox = rc.rectangle(50, 530, 460, 90, {
    roughness: 1.2, stroke: '#cc7722', strokeWidth: 2, fill: 'rgba(204,119,34,0.05)', fillStyle: 'hachure', hachureGap: 10, bowing: 1.5
  });
  addRoughShape(s2NgramBox, 'rough_s2_ngram', 'scene2');

  const s2NeuralBox = rc.rectangle(620, 530, 460, 90, {
    roughness: 1.2, stroke: '#1e8c5a', strokeWidth: 2, fill: 'rgba(30,140,90,0.05)', fillStyle: 'hachure', hachureGap: 10, bowing: 1.5
  });
  addRoughShape(s2NeuralBox, 'rough_s2_neural', 'scene2');

  // Scene 4 Rough.js shapes
  // Rough box around the token input
  const s4TokenFrame = rc.rectangle(55, 155, 100, 55, {
    roughness: 1.8, stroke: '#cc7722', strokeWidth: 2, fill: 'none', bowing: 2
  });
  addRoughShape(s4TokenFrame, 'rough_s4_token', 'scene4');

  // Rough circle highlight around the semantic space area
  const s4SemanticFrame = rc.rectangle(660, 130, 570, 450, {
    roughness: 1.4, stroke: '#555', strokeWidth: 1.5, fill: 'none', bowing: 1.5
  });
  addRoughShape(s4SemanticFrame, 'rough_s4_semantic', 'scene4');

  // Scene 5 Rough.js shapes
  // Rough box around the "Why Position Matters" section
  const s5WhyBox = rc.rectangle(50, 155, 560, 130, {
    roughness: 1.5, stroke: '#cc3333', strokeWidth: 1.5, fill: 'rgba(204,51,51,0.03)', fillStyle: 'hachure', hachureGap: 14, bowing: 2
  });
  addRoughShape(s5WhyBox, 'rough_s5_why', 'scene5');

  // Rough box around the PE formulas
  const s5PeBox = rc.rectangle(50, 345, 580, 90, {
    roughness: 1.3, stroke: '#8844aa', strokeWidth: 1.5, fill: 'rgba(136,68,170,0.03)', fillStyle: 'hachure', hachureGap: 12, bowing: 1.5
  });
  addRoughShape(s5PeBox, 'rough_s5_pe', 'scene5');

  // Scene 6 Rough.js: Frame around the sentence area
  const s6SentenceFrame = rc.rectangle(55, 150, 720, 170, {
    roughness: 1.5, stroke: '#8844aa', strokeWidth: 1.5, fill: 'rgba(136,68,170,0.03)', fillStyle: 'hachure', hachureGap: 14, bowing: 2
  });
  addRoughShape(s6SentenceFrame, 'rough_s6_sentence', 'scene6');

  // Scene 7 Rough.js: Frame around the numerical example
  const s7ExampleFrame = rc.rectangle(55, 270, 950, 340, {
    roughness: 1.3, stroke: '#8844aa', strokeWidth: 1.5, fill: 'rgba(136,68,170,0.02)', fillStyle: 'hachure', hachureGap: 16, bowing: 1.5
  });
  addRoughShape(s7ExampleFrame, 'rough_s7_example', 'scene7');

  // Scene 8 Rough.js: Rough bracket connecting all heads
  const s8Bracket = rc.rectangle(50, 110, 1070, 280, {
    roughness: 1.6, stroke: '#555', strokeWidth: 1, fill: 'none', bowing: 2
  });
  addRoughShape(s8Bracket, 'rough_s8_bracket', 'scene8');

  // Scene 9 Rough.js: Frame around the transformer block diagram
  const s9Frame = rc.rectangle(90, 100, 340, 490, {
    roughness: 1.8, stroke: '#2b7ec2', strokeWidth: 1.5, fill: 'none', bowing: 2
  });
  addRoughShape(s9Frame, 'rough_s9_frame', 'scene9');

  // Scene 10 Rough.js: Frame around entire pipeline
  const s10Frame = rc.rectangle(20, 115, 1210, 80, {
    roughness: 1.4, stroke: '#555', strokeWidth: 1, fill: 'none', bowing: 1.5
  });
  addRoughShape(s10Frame, 'rough_s10_frame', 'scene10');

  // Scene 11 Rough.js: Rough circle around training cost section
  const s11CostFrame = rc.ellipse(640, 560, 520, 130, {
    roughness: 2, stroke: '#cc3333', strokeWidth: 1.5, fill: 'none', bowing: 2.5
  });
  addRoughShape(s11CostFrame, 'rough_s11_cost', 'scene11');

  // Scene 12 Rough.js: Frame around the bar chart area
  const s12ChartFrame = rc.rectangle(70, 160, 470, 250, {
    roughness: 1.5, stroke: '#2299aa', strokeWidth: 1.5, fill: 'none', bowing: 2
  });
  addRoughShape(s12ChartFrame, 'rough_s12_chart', 'scene12');

  // Scene 12 Rough.js: Circle around "high!" loss value
  const s12HighCircle = rc.ellipse(480, 537, 160, 40, {
    roughness: 2.5, stroke: '#cc3333', strokeWidth: 2, fill: 'none', bowing: 2
  });
  addRoughShape(s12HighCircle, 'rough_s12_high', 'scene12');

  // Scene 13 Rough.js: Frame around the plot area
  const s13PlotFrame = rc.rectangle(635, 95, 570, 495, {
    roughness: 1.3, stroke: '#993344', strokeWidth: 1.5, fill: 'none', bowing: 1.5
  });
  addRoughShape(s13PlotFrame, 'rough_s13_plot', 'scene13');

  // Scene 14 Rough.js: Frame around the full pipeline
  const s14PipeFrame = rc.rectangle(50, 100, 1170, 220, {
    roughness: 1.4, stroke: '#555', strokeWidth: 1, fill: 'none', bowing: 1.5
  });
  addRoughShape(s14PipeFrame, 'rough_s14_pipe', 'scene14');

  // Scene 15 Rough.js: Frame around the full stack
  const s15StackFrame = rc.rectangle(290, 210, 420, 430, {
    roughness: 1.8, stroke: '#2b7ec2', strokeWidth: 2, fill: 'none', bowing: 2
  });
  addRoughShape(s15StackFrame, 'rough_s15_stack', 'scene15');

  // ── Master Timeline ──
  const tl = gsap.timeline({
    paused: true,

  // ── Controls ──
  btnPlay.addEventListener('click', () => {
    if (tl.isActive()) {
      tl.pause();
      btnPlay.textContent = '\u25B6 Play';
    } else {
      tl.play();
      btnPlay.textContent = '\u23F8 Pause';
    }
  });

  document.getElementById('btnReplay').addEventListener('click', () => {
    tl.seek(0).pause();
    // Reset all scenes
    document.querySelectorAll('.scene').forEach(s => gsap.set(s, { opacity: 0 }));
    // Reset all clip rects
    document.querySelectorAll('[id^="cr_"]').forEach(r => r.setAttribute('width', '0'));
    // Reset bar rects and percentage labels
    ['#s2_bar1_rect','#s2_bar2_rect','#s2_bar3_rect','#s2_bar4_rect'].forEach(s => {
      gsap.set(s, { attr: { width: 0 } });
    });
    ['#s2_bar1_pct','#s2_bar2_pct','#s2_bar3_pct','#s2_bar4_pct'].forEach(s => {
      gsap.set(s, { opacity: 0 });
    });
    // Reset progress
    gsap.set('#progBar', { attr: { width: 0 } });
    tl.restart();
    btnPlay.textContent = '\u23F8 Pause';
  });

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    tl.seek(seekBar.value / 1000).pause();
    btnPlay.textContent = '\u25B6 Play';
    setTimeout(() => { isSeeking = false; }, 100);
  });

  // Auto-play after fonts load
  document.fonts.ready.then(() => {
    setTimeout(() => {
      tl.play();
      btnPlay.textContent = '\u23F8 Pause';
    }, 400);
  });
});
