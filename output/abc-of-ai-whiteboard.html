<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The ABC of AI — Whiteboard Explainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Caveat:wght@400;700&family=Permanent+Marker&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.wrap{width:100vw;max-width:1280px;aspect-ratio:16/9;position:relative;border-radius:6px;overflow:hidden;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#board{width:100%;height:100%;display:block}
.scene{opacity:0}
#controls{margin-top:10px;display:flex;gap:10px;align-items:center}
#controls button{padding:7px 18px;background:#2b7ec2;color:#fff;border:none;border-radius:5px;font-size:13px;cursor:pointer;transition:background 0.2s}
#controls button:hover{background:#1e5fa0}
#timeDisp{color:#888;font:13px/1 monospace;min-width:90px}
#seekBar{width:300px;cursor:pointer;accent-color:#2b7ec2}
</style>
</head>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
<script>
if (typeof DrawSVGPlugin !== 'undefined') gsap.registerPlugin(DrawSVGPlugin);

document.addEventListener('DOMContentLoaded', () => {
  const TOTAL = 90;
  const board = document.getElementById('board');
  const seekBar = document.getElementById('seekBar');
  const timeDisp = document.getElementById('timeDisp');
  const btnPlay = document.getElementById('btnPlay');
  const progBar = document.getElementById('progBar');
  let isSeeking = false;

  // ── Rough.js Setup ──
  const rc = rough.svg(board);

  // ── Utility Functions ──
  function drawOn(el, dur, ease) {
    if (typeof el === 'string') el = document.getElementById(el);
    if (!el) return gsap.to({}, { duration: 0.01 });
    if (typeof DrawSVGPlugin !== 'undefined') {
      return gsap.fromTo(el, { drawSVG: '0%' }, { drawSVG: '100%', duration: dur, ease: ease || 'power1.inOut' });
    }
    const len = el.getTotalLength ? el.getTotalLength() : 500;
    return gsap.fromTo(el,
      { strokeDasharray: len, strokeDashoffset: len },
      { strokeDashoffset: 0, duration: dur, ease: ease || 'power1.inOut' }
    );
  }

  function wipe(id, w, dur, ease) {
    return gsap.to('#' + id, { attr: { width: w }, duration: dur, ease: ease || 'power1.inOut' });
  }

  function fadeIn(sel, dur) {
    return gsap.to(sel, { opacity: 1, duration: dur || 1.5, ease: 'power2.out' });
  }

  function showScene(sel) { gsap.set(sel, { opacity: 1 }); }
  function hideScene(sel) { gsap.set(sel, { opacity: 0 }); }

  function addRoughShape(shape, id, parentId) {
    shape.setAttribute('opacity', '0');
    shape.id = id;
    document.getElementById(parentId).appendChild(shape);
    return shape;
  }

  // ── Rough.js Shapes ──

  // Scene 1: ABC letter blocks
  const hachureOpts = (color, fillColor) => ({
    roughness: 1.8, stroke: color, strokeWidth: 3.5,
    fill: fillColor, fillStyle: 'hachure', hachureGap: 8, bowing: 2
  });
  addRoughShape(rc.rectangle(130, 400, 180, 170, hachureOpts('#1e8c5a', 'rgba(30,140,90,0.06)')), 'rough_s1_a', 'scene1');
  addRoughShape(rc.rectangle(490, 400, 180, 170, hachureOpts('#cc7722', 'rgba(204,119,34,0.06)')), 'rough_s1_b', 'scene1');
  addRoughShape(rc.rectangle(850, 400, 180, 170, hachureOpts('#8844aa', 'rgba(136,68,170,0.06)')), 'rough_s1_c', 'scene1');

  // Scene 6: Letter circles
  const circleOpts = (color) => ({ roughness: 1.8, stroke: color, strokeWidth: 3.5 });
  addRoughShape(rc.circle(130, 180, 90, circleOpts('#1e8c5a')), 'rough_s6_a', 'scene6');
  addRoughShape(rc.circle(130, 345, 90, circleOpts('#cc7722')), 'rough_s6_b', 'scene6');
  addRoughShape(rc.circle(130, 505, 90, circleOpts('#8844aa')), 'rough_s6_c', 'scene6');

  // ── Master Timeline ──
  const tl = gsap.timeline({
    paused: true,
    onUpdate() {
      const t = tl.time();
      if (!isSeeking) seekBar.value = Math.round(t * 1000);
      timeDisp.textContent = t.toFixed(1) + ' / ' + TOTAL + 's';
      gsap.set(progBar, { attr: { width: (t / TOTAL) * 1280 } });
    }
  });

  // ═══════════════════════════════════════════
  //  SCENE 1: Title Card  (0s → 10s)
  // ═══════════════════════════════════════════
  tl.call(() => showScene('#scene1'), null, 0);

  // 0.3s — Title wipes in (1.8s)
  tl.add(wipe('cr_s1_title', 1080, 1.8), 0.3);

  // 2.5s — Underline draws on (0.8s)
  tl.add(drawOn('s1_ul', 0.8), 2.5);

  // 3.8s — Subtitle wipes in (1.5s)
  tl.add(wipe('cr_s1_sub', 800, 1.5), 3.8);

  // 5.8s — A block Rough.js fades in (1.0s) + letter wipes
  tl.add(fadeIn('#rough_s1_a', 1.0), 5.8);
  tl.add(wipe('cr_s1_la', 180, 0.8), 6.0);

  // 7.0s — B block
  tl.add(fadeIn('#rough_s1_b', 1.0), 7.0);
  tl.add(wipe('cr_s1_lb', 180, 0.8), 7.2);
  tl.to('#s1_dot1', { opacity: 1, duration: 0.3 }, 7.0);

  // 8.2s — C block
  tl.add(fadeIn('#rough_s1_c', 1.0), 8.2);
  tl.add(wipe('cr_s1_lc', 180, 0.8), 8.4);
  tl.to('#s1_dot2', { opacity: 1, duration: 0.3 }, 8.2);

  // ═══════════════════════════════════════════
  //  SCENE 2: A = Artificial Intelligence  (10s → 28s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene1'); showScene('#scene2'); }, null, 10.0);

  // 10.3s — Big A wipes in (1.0s)
  tl.add(wipe('cr_s2_bigA', 160, 1.0), 10.3);

  // 11.5s — "= Artificial Intelligence" wipes in (1.5s)
  tl.add(wipe('cr_s2_word', 600, 1.5), 11.5);

  // 13.5s — Green underline draws on (0.8s)
  tl.add(drawOn('s2_ul', 0.8), 13.5);

  // 14.8s — Definition wipes in (1.5s)
  tl.add(wipe('cr_s2_def', 600, 1.5), 14.8);

  // 16.8s — Robot head draws on stroke-by-stroke (1.2s)
  tl.add(drawOn('s2_robot_head', 1.2), 16.8);

  // 18.2s — Robot eyes draw on (0.8s each, staggered)
  tl.add(drawOn('s2_eye_l', 0.8), 18.2);
  tl.add(drawOn('s2_eye_r', 0.8), 18.5);

  // 19.4s — Pupils appear
  tl.to('#s2_pupil_l', { opacity: 1, duration: 0.3 }, 19.4);
  tl.to('#s2_pupil_r', { opacity: 1, duration: 0.3 }, 19.5);

  // 19.8s — Mouth draws on (0.6s)
  tl.add(drawOn('s2_mouth', 0.6), 19.8);

  // 20.5s — Antenna draws on (0.6s) + ball (0.6s)
  tl.add(drawOn('s2_antenna', 0.6), 20.5);
  tl.add(drawOn('s2_antenna_ball', 0.6), 21.0);

  // 21.8s — Signal arcs draw on (0.6s each)
  tl.add(drawOn('s2_signal1', 0.6), 21.8);
  tl.add(drawOn('s2_signal2', 0.6), 22.2);

  // 22.8s — Robot body draws on (1.2s)
  tl.add(drawOn('s2_robot_body', 1.2), 22.8);

  // 24.0s — Hatching fades in slowly (1.5s)
  tl.add(fadeIn('#s2_hatching', 1.5), 24.0);

  // 24.5s — Arms draw on (0.6s each)
  tl.add(drawOn('s2_arm_l', 0.6), 24.5);
  tl.add(drawOn('s2_arm_r', 0.6), 24.8);

  // 25.0s — Analogy text wipes in (1.2s)
  tl.add(wipe('cr_s2_ana', 600, 1.2), 25.0);

  // 25.2s — Legs draw on (0.6s each)
  tl.add(drawOn('s2_leg_l', 0.6), 25.2);
  tl.add(drawOn('s2_leg_r', 0.6), 25.5);

  // 25.5s — Heart circle + heartbeat draw on (0.8s)
  tl.add(drawOn('s2_heart', 0.8), 25.5);
  tl.add(drawOn('s2_heartbeat', 0.6), 26.0);

  // 26.5s — Ground line draws on (0.6s)
  tl.add(drawOn('s2_ground', 0.6), 26.5);

  // 26.5s — Thought bubbles draw on (0.5s each, staggered)
  tl.add(drawOn('s2_bubble1', 0.5), 26.5);
  tl.add(drawOn('s2_bubble2', 0.6), 26.8);

  // 27.0s — Example text wipes in (1.0s)
  tl.add(wipe('cr_s2_ex', 600, 1.0), 27.0);

  // 27.2s — Third thought bubble (0.8s)
  tl.add(drawOn('s2_bubble3', 0.8), 27.2);

  // 27.5s — Lightbulb fades in (0.8s)
  tl.add(fadeIn('#s2_bulb', 0.8), 27.5);

  // ═══════════════════════════════════════════
  //  SCENE 3: B = Big Data  (28s → 48s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene2'); showScene('#scene3'); }, null, 28.0);

  // 28.3s — Big B wipes in (1.0s)
  tl.add(wipe('cr_s3_bigB', 140, 1.0), 28.3);

  // 29.5s — "= Big Data" wipes in (1.2s)
  tl.add(wipe('cr_s3_word', 380, 1.2), 29.5);

  // 31.0s — Orange underline draws on (0.8s)
  tl.add(drawOn('s3_ul', 0.8), 31.0);

  // 32.2s — Definition wipes in (1.5s)
  tl.add(wipe('cr_s3_def', 600, 1.5), 32.2);

  // 34.2s — Photo frame 1 draws on (1.0s)
  tl.add(drawOn('s3_photo1', 1.0), 34.2);

  // 35.5s — Photo frame 2 draws on (1.0s)
  tl.add(drawOn('s3_photo2', 1.0), 35.5);

  // 36.8s — Photo frame 3 draws on (1.0s)
  tl.add(drawOn('s3_photo3', 1.0), 36.8);

  // 38.0s — Inner photo area + dog fades in (2.0s)
  tl.to('#s3_photo_inner', { opacity: 1, duration: 0.5 }, 38.0);
  tl.add(fadeIn('#s3_dog_group', 2.0), 38.2);

  // 40.5s — Paw prints draw on (0.8s each staggered)
  tl.add(drawOn('s3_paw1', 0.8), 40.5);
  tl.add(drawOn('s3_paw2', 0.8), 41.0);
  tl.add(drawOn('s3_paw3', 0.8), 41.5);

  // 42.5s — Data dots fade in (1.5s)
  tl.add(fadeIn('#s3_datadots', 1.5), 42.5);

  // 44.0s — Analogy wipes in (1.5s)
  tl.add(wipe('cr_s3_ana', 600, 1.5), 44.0);

  // 46.0s — "1,000,000+" wipes in (1.2s)
  tl.add(wipe('cr_s3_count', 400, 1.2), 46.0);

  // ═══════════════════════════════════════════
  //  SCENE 4: C = Computer Learning  (48s → 68s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene3'); showScene('#scene4'); }, null, 48.0);

  // 48.3s — Big C wipes in (1.0s)
  tl.add(wipe('cr_s4_bigC', 130, 1.0), 48.3);

  // 49.5s — "= Computer Learning" wipes in (1.2s)
  tl.add(wipe('cr_s4_word', 500, 1.2), 49.5);

  // 51.0s — Purple underline draws on (0.8s)
  tl.add(drawOn('s4_ul', 0.8), 51.0);

  // 52.2s — Box 1 draws on (1.2s)
  tl.add(drawOn('s4_box1', 1.2), 52.2);

  // 53.5s — Photos inside fade in (1.5s)
  tl.add(fadeIn('#s4_photos', 1.5), 53.5);

  // 55.0s — "Show Examples" label wipes in (0.8s)
  tl.add(wipe('cr_s4_step1', 300, 0.8), 55.0);

  // 56.0s — Arrow 1 draws on (0.8s) + arrowhead (0.6s)
  tl.add(drawOn('s4_arrow1', 0.8), 56.0);
  tl.add(drawOn('s4_arrowhead1', 0.6), 56.6);

  // 57.5s — Box 2 draws on (1.2s)
  tl.add(drawOn('s4_box2', 1.2), 57.5);

  // 58.8s — Brain icon fades in (2.0s)
  tl.add(fadeIn('#s4_brain', 2.0), 58.8);

  // 60.8s — "Find Patterns" label wipes in (0.8s)
  tl.add(wipe('cr_s4_step2', 290, 0.8), 60.8);

  // 62.0s — Arrow 2 draws on (0.8s) + arrowhead (0.6s)
  tl.add(drawOn('s4_arrow2', 0.8), 62.0);
  tl.add(drawOn('s4_arrowhead2', 0.6), 62.6);

  // 63.5s — Box 3 draws on (1.2s)
  tl.add(drawOn('s4_box3', 1.2), 63.5);

  // 64.8s — Checkmark fades in (1.5s)
  tl.add(fadeIn('#s4_check', 1.5), 64.8);

  // 65.5s — "DOG!" wipes in (0.8s)
  tl.add(wipe('cr_s4_dog', 200, 0.8), 65.5);

  // 66.5s — "Make Predictions" label wipes in (0.8s)
  tl.add(wipe('cr_s4_step3', 300, 0.8), 66.5);

  // 67.0s — Bottom text wipes in (1.0s)
  tl.add(wipe('cr_s4_bot', 960, 1.0), 67.0);

  // ═══════════════════════════════════════════
  //  SCENE 5: Putting It Together  (68s → 80s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene4'); showScene('#scene5'); }, null, 68.0);

  // 68.3s — Title wipes in (1.5s)
  tl.add(wipe('cr_s5_title', 880, 1.5), 68.3);

  // 70.0s — Title underline draws on (0.6s)
  tl.add(drawOn('s5_ul', 0.6), 70.0);

  // 70.8s — Box 1 draws on (1.0s)
  tl.add(drawOn('s5_box1', 1.0), 70.8);
  tl.add(fadeIn('#s5_icon1', 1.5), 71.5);
  tl.add(wipe('cr_s5_data', 300, 0.8), 72.5);

  // 73.5s — Arrow 1 draws on (0.8s) + head (0.5s)
  tl.add(drawOn('s5_arrow1', 0.8), 73.5);
  tl.add(drawOn('s5_arrowhead1', 0.5), 74.0);

  // 74.5s — Box 2 draws on (1.0s)
  tl.add(drawOn('s5_box2', 1.0), 74.5);
  tl.add(fadeIn('#s5_icon2', 1.5), 75.2);
  tl.add(wipe('cr_s5_learn', 340, 0.8), 76.0);

  // 76.8s — Arrow 2 draws on (0.8s) + head (0.5s)
  tl.add(drawOn('s5_arrow2', 0.8), 76.8);
  tl.add(drawOn('s5_arrowhead2', 0.5), 77.3);

  // 77.8s — Box 3 draws on (1.0s)
  tl.add(drawOn('s5_box3', 1.0), 77.8);
  tl.add(fadeIn('#s5_icon3', 1.5), 78.5);
  tl.add(wipe('cr_s5_ai', 330, 0.8), 79.0);

  // 79.2s — Sparkles fade in (0.5s)
  tl.add(fadeIn('#s5_sparkles', 0.5), 79.2);

  // 79.0s — Summary wipes in (1.0s)
  tl.add(wipe('cr_s5_sum', 980, 1.0), 79.0);

  // ═══════════════════════════════════════════
  //  SCENE 6: Recap  (80s → 90s)
  // ═══════════════════════════════════════════
  tl.call(() => { hideScene('#scene5'); showScene('#scene6'); }, null, 80.0);

  // 80.3s — Title wipes in (1.2s)
  tl.add(wipe('cr_s6_title', 780, 1.2), 80.3);

  // 81.6s — Underline draws on (0.5s)
  tl.add(drawOn('s6_ul', 0.5), 81.6);

  // 82.2s — Row A: circle + text + checkmark drawn on
  tl.add(fadeIn('#rough_s6_a', 0.8), 82.2);
  tl.add(wipe('cr_s6_rowa', 900, 1.0), 82.5);
  tl.add(drawOn('s6_checkA', 0.6), 83.3);

  // 84.0s — Row B
  tl.add(fadeIn('#rough_s6_b', 0.8), 84.0);
  tl.add(wipe('cr_s6_rowb', 900, 1.0), 84.3);
  tl.add(drawOn('s6_checkB', 0.6), 85.1);

  // 85.8s — Row C
  tl.add(fadeIn('#rough_s6_c', 0.8), 85.8);
  tl.add(wipe('cr_s6_rowc', 900, 1.0), 86.1);
  tl.add(drawOn('s6_checkC', 0.6), 86.9);

  // 87.5s — Footer wipes in (1.0s)
  tl.add(wipe('cr_s6_footer', 880, 1.0), 87.5);

  // 88.5s — Wavy underline draws on (0.8s)
  tl.add(drawOn('s6_wavyline', 0.8), 88.5);

  // Hold final frame
  tl.to({}, { duration: 0.5 }, TOTAL - 0.5);

  // ── Controls ──
  btnPlay.addEventListener('click', () => {
    if (tl.isActive()) {
      tl.pause();
      btnPlay.textContent = '\u25B6 Play';
    } else {
      tl.play();
      btnPlay.textContent = '\u23F8 Pause';
    }
  });

  document.getElementById('btnReplay').addEventListener('click', () => {
    document.querySelectorAll('.scene').forEach(s => gsap.set(s, { opacity: 0 }));
    document.querySelectorAll('[id^="cr_"]').forEach(r => r.setAttribute('width', '0'));
    gsap.set(progBar, { attr: { width: 0 } });
    tl.restart();
    btnPlay.textContent = '\u23F8 Pause';
  });

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    tl.seek(seekBar.value / 1000).pause();
    btnPlay.textContent = '\u25B6 Play';
  });
  seekBar.addEventListener('change', () => { isSeeking = false; });

  // Auto-play after fonts load
  document.fonts.ready.then(() => {
    tl.play();
    btnPlay.textContent = '\u23F8 Pause';
  });
});
</script>
</body>
</html>
