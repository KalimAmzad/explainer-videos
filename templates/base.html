<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIDEO_TITLE — Whiteboard Explainer</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cabin+Sketch:wght@400;700&family=Caveat:wght@400;700&family=Patrick+Hand&family=Permanent+Marker&display=swap');
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: #111;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 100vh; overflow: hidden;
}
.wrap {
  width: 100vw; max-width: 1280px;
  aspect-ratio: 16/9; position: relative;
  border-radius: 6px; overflow: hidden;
  box-shadow: 0 8px 40px rgba(0,0,0,.6);
}
#board { width: 100%; height: 100%; display: block; }
.scene { opacity: 0; }
#controls {
  margin-top: 10px; display: flex; gap: 10px; align-items: center;
}
#controls button {
  padding: 7px 18px; background: #2b7ec2; color: #fff;
  border: none; border-radius: 5px; font-size: 13px; cursor: pointer;
  transition: background 0.2s;
}
#controls button:hover { background: #1e5fa0; }
#timeDisp { color: #888; font: 13px/1 monospace; min-width: 90px; }
#seekBar { width: 300px; cursor: pointer; accent-color: #2b7ec2; }
</style>
</head>
<body>
<div class="wrap">
<svg id="board" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720">
<defs>
  <!-- Background gradient -->
  <linearGradient id="bg" x1="0" y1="0" x2=".04" y2="1">
    <stop offset="0%" stop-color="#f5f3ef"/>
    <stop offset="100%" stop-color="#edeae4"/>
  </linearGradient>

  <!-- ═══ CLIP PATHS FOR TEXT REVEALS ═══ -->
  <!-- Scene 1 -->
  <clipPath id="cp_s1_title"><rect id="cr_s1_title" x="0" y="0" width="0" height="80"/></clipPath>
  <!-- Add more clipPaths per scene/text element -->
</defs>

<!-- Background -->
<rect width="1280" height="720" fill="url(#bg)"/>

<!-- ═══════════════════════════════════════════════ -->
<!--  SCENE 1: [Scene Title]                        -->
<!-- ═══════════════════════════════════════════════ -->
<g id="scene1" class="scene">
  <!-- Title text with clip wipe -->
  <g clip-path="url(#cp_s1_title)">
    <text x="60" y="70" font-family="'Cabin Sketch',cursive"
          font-size="52" font-weight="700" fill="#2b7ec2">
      Scene 1 Title
    </text>
  </g>

  <!-- Illustration group (starts hidden) -->
  <g id="s1_illustration" opacity="0">
    <!-- SVG paths here -->
  </g>
</g>

<!-- ═══════════════════════════════════════════════ -->
<!--  SCENE 2: [Scene Title]                        -->
<!-- ═══════════════════════════════════════════════ -->
<g id="scene2" class="scene">
  <!-- Scene 2 content -->
</g>

<!-- Progress bar -->
<rect x="0" y="716" width="1280" height="4" fill="#ddd8d0"/>
<rect id="progBar" x="0" y="716" width="0" height="4" fill="#2b7ec2"/>
</svg>
</div>

<div id="controls">
  <button id="btnPlay">&#9654; Play</button>
  <button id="btnReplay">&#8635; Replay</button>
  <input type="range" id="seekBar" min="0" value="0" step="100"/>
  <span id="timeDisp">0.0 / 30.0s</span>
</div>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/DrawSVGPlugin.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.min.js"></script>
<script>
if (typeof DrawSVGPlugin !== 'undefined') gsap.registerPlugin(DrawSVGPlugin);

document.addEventListener('DOMContentLoaded', () => {
  const TOTAL = 30; // Total duration in seconds — UPDATE THIS
  const board = document.getElementById('board');
  const seekBar = document.getElementById('seekBar');
  const timeDisp = document.getElementById('timeDisp');
  const btnPlay = document.getElementById('btnPlay');
  let isSeeking = false;

  seekBar.max = TOTAL * 1000;

  // ── Rough.js Setup ──
  const rc = rough.svg(board);

  // ── Utility Functions ──

  /**
   * Stroke draw-on animation.
   * Uses DrawSVGPlugin if available, falls back to strokeDasharray.
   * @param {string|Element} el - Element ID or DOM element
   * @param {number} dur - Duration in seconds
   * @param {string} ease - GSAP ease string
   */
  function drawOn(el, dur, ease) {
    if (typeof el === 'string') el = document.getElementById(el);
    if (!el) return gsap.to({}, { duration: 0.01 });
    if (typeof DrawSVGPlugin !== 'undefined') {
      return gsap.fromTo(el,
        { drawSVG: '0%' },
        { drawSVG: '100%', duration: dur, ease: ease || 'power1.inOut' }
      );
    }
    // Fallback
    const len = el.getTotalLength ? el.getTotalLength() : 500;
    return gsap.fromTo(el,
      { strokeDasharray: len, strokeDashoffset: len },
      { strokeDashoffset: 0, duration: dur, ease: ease || 'power1.inOut' }
    );
  }

  /**
   * Clip-rect text wipe reveal (left to right).
   * @param {string} clipRectId - ID of the clip rect (without #)
   * @param {number} targetWidth - Final width of the clip rect
   * @param {number} dur - Duration in seconds
   * @param {string} ease - GSAP ease string
   */
  function wipe(clipRectId, targetWidth, dur, ease) {
    return gsap.fromTo('#' + clipRectId,
      { attr: { width: 0 } },
      { attr: { width: targetWidth }, duration: dur, ease: ease || 'power1.inOut' }
    );
  }

  /**
   * Fade-in for complex illustration groups.
   * @param {string} sel - CSS selector
   * @param {number} dur - Duration in seconds
   */
  function fadeIn(sel, dur) {
    return gsap.fromTo(sel, { opacity: 0 }, { opacity: 1, duration: dur || 0.5, ease: 'power2.out' });
  }

  function showScene(sel) { gsap.set(sel, { opacity: 1 }); }
  function hideScene(sel) { gsap.set(sel, { opacity: 0 }); }

  // ── Generate Rough.js Shapes ──
  // Example: hand-drawn box
  // const box = rc.rectangle(100, 200, 300, 150, {
  //   roughness: 1.5, stroke: '#2b7ec2', strokeWidth: 2.5,
  //   fill: 'rgba(43,126,194,0.08)', fillStyle: 'hachure',
  //   hachureAngle: -41, hachureGap: 8, bowing: 2
  // });
  // box.setAttribute('opacity', '0');
  // box.id = 'rough_s1_box';
  // document.getElementById('scene1').appendChild(box);

  // ── Master Timeline ──
  const tl = gsap.timeline({
    paused: true,
    onUpdate() {
      const t = tl.time();
      if (!isSeeking) seekBar.value = Math.round(t * 1000);
      timeDisp.textContent = t.toFixed(1) + ' / ' + TOTAL + 's';
      gsap.set('#progBar', { attr: { width: (t / TOTAL) * 1280 } });
    }
  });

  // ═══════════════════════════════════════════
  //  SCENE 1  (0s → Xs)
  // ═══════════════════════════════════════════
  tl.call(() => showScene('#scene1'), null, 0);

  // 0.2s — Title wipes in
  tl.add(wipe('cr_s1_title', 900, 1.3), 0.2);

  // 2.0s — Illustration fades in
  tl.add(fadeIn('#s1_illustration', 2.0), 2.0);

  // ═══════════════════════════════════════════
  //  SCENE 2  (Xs → Ys)
  // ═══════════════════════════════════════════
  // tl.call(() => { hideScene('#scene1'); showScene('#scene2'); }, null, X);
  // ... add scene 2 animations

  // Hold final frame
  tl.to({}, { duration: 0.5 }, TOTAL - 0.5);

  // ── Controls ──
  btnPlay.addEventListener('click', () => {
    if (tl.isActive()) {
      tl.pause();
      btnPlay.textContent = '\u25B6 Play';
    } else {
      tl.play();
      btnPlay.textContent = '\u23F8 Pause';
    }
  });

  document.getElementById('btnReplay').addEventListener('click', () => {
    tl.seek(0).pause();
    // Reset all scenes
    document.querySelectorAll('.scene').forEach(s => gsap.set(s, { opacity: 0 }));
    // Reset all clip rects
    document.querySelectorAll('[id^="cr_"]').forEach(r => r.setAttribute('width', '0'));
    // Reset all opacity-animated elements
    document.querySelectorAll('[opacity="0"]').forEach(el => gsap.set(el, { opacity: 0 }));
    // Reset progress
    gsap.set('#progBar', { attr: { width: 0 } });
    tl.restart();
    btnPlay.textContent = '\u23F8 Pause';
  });

  seekBar.addEventListener('input', () => {
    isSeeking = true;
    tl.seek(seekBar.value / 1000).pause();
    btnPlay.textContent = '\u25B6 Play';
    setTimeout(() => { isSeeking = false; }, 100);
  });

  // Auto-play after fonts load
  setTimeout(() => {
    tl.play();
    btnPlay.textContent = '\u23F8 Pause';
  }, 800);
});
</script>
</body>
</html>
